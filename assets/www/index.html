<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreFlow Engine</title>

    <!-- Локальный (offline) движок нотного рендеринга. Грузится через
         InAppLocalhostServer, поэтому относительный путь резолвится. -->
    <script src="js/vexflow.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #notation-container {
            position: relative;
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }
        #notation-container svg { display: block; }
        #playhead {
            position: absolute;
            top: 8px;
            width: 2px;
            background-color: rgba(33, 150, 243, 0.85);
            opacity: 0;
            transition: opacity 0.12s ease;
            pointer-events: none;
        }
        #playhead.active { opacity: 1; }

        /* Слой подсветки звучащих нот (поверх SVG, не перехватывает клики). */
        #note-highlights {
            position: absolute;
            left: 0; top: 0;
            pointer-events: none;
        }
        .note-hl {
            position: absolute;
            background: rgba(33, 150, 243, 0.22);
            border-radius: 3px;
            pointer-events: none;
        }
        #engine-error {
            padding: 16px;
            color: #c62828;
            font-size: 14px;
            text-align: center;
        }

        /* Постраничная вёрстка A4. На экране уносим за пределы вьюпорта, но
           НЕ через display:none — иначе measureText/getBBox вернут 0 и текст
           (заголовок) не отцентрируется. При печати возвращаем на место. */
        #print-root { position: fixed; left: -10000px; top: 0; }
        .pf-page {
            width: 794px;
            height: 1123px;
            position: relative;
            margin: 0 auto;
            background: #ffffff;
            overflow: hidden;
        }
        @media print {
            @page { size: A4; margin: 0; }
            html, body { background: #ffffff; }
            #notation-container { display: none !important; }
            #print-root { position: static; left: auto; }
            .pf-page {
                margin: 0;
                page-break-after: always;
                break-after: page;
            }
            .pf-page:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body>
    <div id="notation-container">
        <div id="playhead"></div>
    </div>

    <!-- Контейнер постраничной вёрстки A4 (виден только при печати) -->
    <div id="print-root"></div>

    <script>
    // =====================================================================
    //  ScoreFlow notation engine — data-driven VexFlow renderer + JS bridge
    // =====================================================================
    (function () {
        'use strict';

        const REST_KEY = { treble: 'b/4', bass: 'd/3', percussion: 'b/4' };
        const PAD = 8;            // CSS-padding контейнера (см. #notation-container)
        let lastPayload = null;   // отрисуем заново при ресайзе
        let lastLayout = null;    // геометрия последней раскладки (для экспорта)
        let noteHits = [];        // bounding box'ы нот для тап-навигации
        let noteHitIndex = {};    // noteId ("m:v:i") -> bbox (playhead/подсветка)
        let tapAttached = false;

        function el(id) { return document.getElementById(id); }

        function showError(msg) {
            const c = el('notation-container');
            let e = el('engine-error');
            if (!e) {
                e = document.createElement('div');
                e.id = 'engine-error';
                c.appendChild(e);
            }
            e.textContent = msg;
        }

        function clearCanvas() {
            const c = el('notation-container');
            const svg = c.querySelector('svg');
            if (svg) svg.remove();
            const err = el('engine-error');
            if (err) err.remove();
        }

        // --- Разбор ключа VexFlow на букву + акциденталь ("c#/4" -> '#') -----
        function accidentalOf(key) {
            const letterAndAcc = key.split('/')[0]; // "c#" / "cb" / "c"
            const acc = letterAndAcc.substring(1);  // "#", "b", "##", "bb" или ""
            return (acc === '#' || acc === 'b' || acc === '##' || acc === 'bb')
                ? acc : null;
        }

        // --- Построение тиклов одного голоса -------------------------------
        function buildVoice(VF, notes, clef, beats, beatValue, cursorIdx, measureIndex, voiceId) {
            const tickables = [];

            if (!notes || notes.length === 0) {
                // Пустой такт -> целая пауза, чтобы такт всегда рисовался.
                const placeholder = new VF.StaveNote({
                    keys: [REST_KEY[clef]], duration: 'wr', clef: clef,
                });
                placeholder.__hit = { m: measureIndex, v: voiceId, i: -1 };
                tickables.push(placeholder);
            } else {
                notes.forEach((n, i) => {
                    const isRest = !!n.rest;
                    const dur = isRest ? n.duration + 'r' : n.duration;
                    const keys = isRest ? [REST_KEY[clef]] : n.keys;
                    const sn = new VF.StaveNote({
                        keys: keys, duration: dur, clef: clef, auto_stem: true,
                    });
                    if (!isRest) {
                        keys.forEach((k, ki) => {
                            const acc = accidentalOf(k);
                            if (acc) sn.addModifier(new VF.Accidental(acc), ki);
                        });
                    }
                    if (i === cursorIdx) {
                        sn.setStyle({ fillStyle: '#2196F3', strokeStyle: '#2196F3' });
                    }
                    sn.__hit = { m: measureIndex, v: voiceId, i: i };
                    tickables.push(sn);
                });
            }

            const voice = new VF.Voice({ num_beats: beats, beat_value: beatValue });
            voice.setMode(VF.Voice.Mode.SOFT); // терпим неполный такт при редактировании
            voice.addTickables(tickables);
            return voice;
        }

        // --- Главная функция отрисовки -------------------------------------
        // [forcedWidth] — фиксированная ширина полотна (для экспорта в PDF под
        // печатную ширину A4); иначе берётся ширина контейнера.
        function render(score, forcedWidth) {
            if (typeof Vex === 'undefined' || !Vex.Flow) {
                showError('Нотный движок не загрузился (assets/www/js/vexflow.js).');
                return;
            }
            const VF = Vex.Flow;
            clearCanvas();
            noteHits = [];

            const container = el('notation-container');
            const width = forcedWidth || Math.max(320, container.clientWidth);
            const ts = (score.timeSignature || '4/4').split('/');
            const beats = parseInt(ts[0], 10) || 4;
            const beatValue = parseInt(ts[1], 10) || 4;
            const isDrums = score.instrument === 'drums';
            const measures = score.measures || [];
            const cursor = score.cursor || { measure: -1, voice: '', index: -1 };

            // --- раскладка: несколько тактов в строку, перенос по ширине ----
            const margin = 8;
            const usableW = width - 2 * margin;
            const minMeasureW = isDrums ? 180 : 220;
            let perRow = Math.max(1, Math.floor(usableW / minMeasureW));
            perRow = Math.min(perRow, Math.max(1, measures.length));
            const measureW = usableW / perRow;
            const rows = Math.ceil(Math.max(1, measures.length) / perRow);
            const rowH = isDrums ? 130 : 200;
            const bassDY = 90;
            const totalH = rows * rowH + 2 * margin;

            const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
            renderer.resize(width, totalH);
            const ctx = renderer.getContext();

            for (let i = 0; i < measures.length; i++) {
                const m = measures[i];
                const row = Math.floor(i / perRow);
                const col = i % perRow;
                const x = margin + col * measureW;
                const yTop = margin + row * rowH;
                const rowStart = col === 0;
                const isFirst = i === 0;

                try {
                    if (isDrums) {
                        const stave = new VF.Stave(x, yTop + 20, measureW);
                        if (rowStart) stave.addClef('percussion');
                        if (isFirst) stave.addTimeSignature(score.timeSignature);
                        stave.setContext(ctx).draw();

                        const cIdx = (cursor.measure === i && cursor.voice === 'perc')
                            ? cursor.index : -1;
                        const v = buildVoice(VF, m.perc, 'percussion', beats, beatValue, cIdx, i, 'perc');
                        formatAndDraw(VF, ctx, [v], [stave], measureW, rowStart, isFirst, beats, beatValue);
                    } else {
                        const treble = new VF.Stave(x, yTop, measureW);
                        const bass = new VF.Stave(x, yTop + bassDY, measureW);
                        if (rowStart) { treble.addClef('treble'); bass.addClef('bass'); }
                        if (isFirst) {
                            treble.addKeySignature(score.keySignature || 'C');
                            bass.addKeySignature(score.keySignature || 'C');
                            treble.addTimeSignature(score.timeSignature);
                            bass.addTimeSignature(score.timeSignature);
                        }
                        treble.setContext(ctx).draw();
                        bass.setContext(ctx).draw();

                        const tIdx = (cursor.measure === i && cursor.voice === 'treble')
                            ? cursor.index : -1;
                        const bIdx = (cursor.measure === i && cursor.voice === 'bass')
                            ? cursor.index : -1;
                        const tv = buildVoice(VF, m.treble, 'treble', beats, beatValue, tIdx, i, 'treble');
                        const bv = buildVoice(VF, m.bass, 'bass', beats, beatValue, bIdx, i, 'bass');
                        formatAndDraw(VF, ctx, [tv, bv], [treble, bass], measureW, rowStart, isFirst, beats, beatValue);

                        if (rowStart) {
                            new VF.StaveConnector(treble, bass)
                                .setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
                            new VF.StaveConnector(treble, bass)
                                .setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();
                        }
                    }
                } catch (err) {
                    console.error('Render measure ' + i + ' failed:', err);
                }
            }

            // индекс координат нот по noteId — для note-synced playhead/подсветки
            noteHitIndex = {};
            for (let h = 0; h < noteHits.length; h++) {
                noteHitIndex[noteHits[h].id] = noteHits[h];
            }

            // геометрия раскладки — нужна экспортёру и плееру
            lastLayout = { width: width, totalH: totalH, rowH: rowH, rows: rows,
                           perRow: perRow, margin: margin };

            // если идёт воспроизведение — пересобрать события под новую раскладку
            Playback.onRender();

            attachTapListener();
        }

        // Группы для бимовки: по одной доле в простых размерах и по три
        // восьмых в составных (6/8, 9/8, 12/8). Возвращает массив VF.Fraction.
        function beamGroups(VF, beats, beatValue) {
            if (beatValue === 8 && beats % 3 === 0) {
                return [new VF.Fraction(3, 8)];
            }
            return [new VF.Fraction(1, beatValue)];
        }

        function formatAndDraw(VF, ctx, voices, staves, measureW, rowStart, isFirst, beats, beatValue) {
            const fmt = new VF.Formatter();
            voices.forEach((v) => fmt.joinVoices([v]));
            let pad = 24;
            if (rowStart) pad += 36;   // место под ключ
            if (isFirst) pad += 46;    // размер + тональность
            const fw = Math.max(50, measureW - pad);
            fmt.format(voices, fw);

            const groups = beamGroups(VF, beats, beatValue);
            voices.forEach((v, idx) => {
                // Балки создаём ДО отрисовки нот: generateBeams помечает ноты
                // как забимованные, и тогда v.draw не рисует им одиночные флажки.
                const beams = VF.Beam.generateBeams(v.getTickables(), {
                    groups: groups,
                    beam_rests: false,
                    maintain_stem_directions: true,
                });
                v.draw(ctx, staves[idx]);
                beams.forEach((b) => b.setContext(ctx).draw());

                // координаты нот для тап-навигации
                v.getTickables().forEach((t) => {
                    if (!t.__hit) return;
                    let bb;
                    try { bb = t.getBoundingBox(); } catch (e) { return; }
                    if (!bb) return;
                    noteHits.push({
                        id: t.__hit.m + ':' + t.__hit.v + ':' + t.__hit.i,
                        m: t.__hit.m, v: t.__hit.v, i: t.__hit.i,
                        x: bb.getX(), y: bb.getY(), w: bb.getW(), h: bb.getH(),
                    });
                });
            });
        }

        // Тап по партитуре -> ближайшая нота -> курсор во Flutter.
        function attachTapListener() {
            if (tapAttached) return;
            tapAttached = true;
            const container = el('notation-container');
            container.addEventListener('click', function (e) {
                const svg = container.querySelector('svg');
                if (!svg || noteHits.length === 0) return;
                const rect = svg.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;

                let best = null, bestD = Infinity;
                for (const hh of noteHits) {
                    const cx = hh.x + hh.w / 2;
                    const cy = hh.y + hh.h / 2;
                    const d = (px - cx) * (px - cx) + (py - cy) * (py - cy);
                    if (d < bestD) { bestD = d; best = hh; }
                }
                // порог ~90px, чтобы случайные тапы по полю не дёргали курсор
                if (best && bestD <= 90 * 90 && window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onNoteTap', {
                        measure: best.m, voice: best.v, index: best.i,
                    });
                }
            });
        }

        // =================================================================
        //  Профессиональное оффлайн-воспроизведение
        //  - Playback Compiler: партитура -> события (noteId/startBeat/...)
        //  - AudioEngine: синтез голосов и ударных через Web Audio API
        //  - Scheduler: упреждающее планирование по AudioContext.currentTime
        //  - Note-synced playhead + подсветка нот + метроном
        //
        //  setInterval используется ТОЛЬКО как «насос» упреждения; тайминг
        //  звука и визуала привязан к AudioContext.currentTime (паттерн
        //  «двух часов»). setTimeout как механизм синхронизации не применяется.
        // =================================================================

        // длительность VexFlow -> доли в ЧЕТВЕРТЯХ (quarter beats)
        const QBEATS = { w: 4, h: 2, q: 1, '8': 0.5, '16': 0.25 };

        // VexFlow-ключ "c#/4" -> частота (Гц); для ударных не используется
        const SEMI = { c: 0, d: 2, e: 4, f: 5, g: 7, a: 9, b: 11 };
        function keyToFreq(key) {
            const parts = key.split('/');
            const la = (parts[0] || 'a').toLowerCase();
            let semis = SEMI[la[0]];
            if (semis === undefined) return 440;
            for (let k = 1; k < la.length; k++) {
                if (la[k] === '#') semis += 1;
                else if (la[k] === 'b') semis -= 1;
            }
            const octave = parseInt(parts[1], 10);
            const midi = (octave + 1) * 12 + semis;
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        // VexFlow-ключ "c#/4" -> MIDI-номер (для сэмплерного рояля)
        function keyToMidi(key) {
            const parts = key.split('/');
            const la = (parts[0] || 'a').toLowerCase();
            let semis = SEMI[la[0]];
            if (semis === undefined) semis = 9;
            for (let k = 1; k < la.length; k++) {
                if (la[k] === '#') semis += 1;
                else if (la[k] === 'b') semis -= 1;
            }
            return (parseInt(parts[1], 10) + 1) * 12 + semis;
        }

        // Полный ключ VexFlow "линия/октава[/головка]" -> канонический ударный.
        // Головка различает артикуляции на одной линии (хай-хэт x2/x3, и т.д.).
        const DRUM_FULL = {
            'f/4': 'kick',
            'c/5': 'snare',
            'g/5/x2': 'hihat_closed',
            'g/5/x3': 'hihat_open',
            'd/4/x2': 'hihat_pedal',
            'a/5/x2': 'crash1',
            'b/5/x2': 'crash2',
            'f/5/x2': 'ride',
            'f/5/d0': 'ride_bell',
            'e/5': 'tom_high',
            'd/5': 'tom_mid',
            'a/4': 'tom_floor',
        };
        // Запасное сопоставление по позиции — для старых партитур без головки.
        const DRUM_BASE = {
            'f/4': 'kick', 'c/5': 'snare', 'g/5': 'hihat_closed', 'd/4': 'hihat_pedal',
            'e/5': 'tom_high', 'd/5': 'tom_mid', 'a/4': 'tom_floor',
            'a/5': 'crash1', 'b/5': 'crash2', 'f/5': 'ride',
        };
        function drumType(key) {
            const p = key.split('/');
            const full = p[0] + '/' + p[1] + (p[2] ? '/' + p[2] : '');
            return DRUM_FULL[full] || DRUM_BASE[p[0] + '/' + p[1]] || 'snare';
        }

        // --- Playback Compiler ---------------------------------------------
        // Событие: { noteId, startBeat, durationBeats, keys, voiceId, rest }.
        // Биты — в четвертях. Старт каждого такта привязан к его индексу
        // (base = mi * measureQ), поэтому неполные/перелитые такты не сбивают
        // временную сетку. Паузы и пустые такты дают «якоря» для playhead.
        function compilePlayback(payload) {
            const ts = (payload.timeSignature || '4/4').split('/');
            const beats = parseInt(ts[0], 10) || 4;
            const beatValue = parseInt(ts[1], 10) || 4;
            const isDrums = payload.instrument === 'drums';
            const voiceIds = isDrums ? ['perc'] : ['treble', 'bass'];
            const measures = payload.measures || [];
            const measureQ = beats * (4 / beatValue); // длина такта в четвертях
            const events = [];

            for (let mi = 0; mi < measures.length; mi++) {
                const base = mi * measureQ;
                for (let vi = 0; vi < voiceIds.length; vi++) {
                    const v = voiceIds[vi];
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    if (notes.length === 0) {
                        events.push({ noteId: mi + ':' + v + ':-1', startBeat: base,
                            durationBeats: measureQ, keys: [], voiceId: v, rest: true });
                        continue;
                    }
                    let acc = 0;
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        const q = QBEATS[n.duration] != null ? QBEATS[n.duration] : 1;
                        events.push({
                            noteId: mi + ':' + v + ':' + ni,
                            startBeat: base + acc,
                            durationBeats: q,
                            keys: n.keys || [],
                            voiceId: v,
                            rest: !!n.rest,
                            // Громкость ноты (0..1). Сейчас по умолчанию mf;
                            // позже сюда проецируются динамические оттенки.
                            velocity: n.velocity != null ? n.velocity : 0.78,
                        });
                        acc += q;
                    }
                }
            }
            events.sort(function (a, b) { return a.startBeat - b.startBeat; });
            return {
                events: events,
                totalBeats: measures.length * measureQ,
                beats: beats, beatValue: beatValue, measureQ: measureQ,
                isDrums: isDrums, primaryVoice: isDrums ? 'perc' : 'treble',
            };
        }

        // --- AudioEngine (Web Audio API, полностью оффлайн) ----------------
        const AudioEngine = {
            ctx: null, master: null, noise: null,

            ensure: function () {
                if (this.ctx) return this.ctx;
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return null;
                this.ctx = new AC();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.9;
                this.master.connect(this.ctx.destination);
                // буфер белого шума для ударных — создаётся один раз
                const len = Math.floor(this.ctx.sampleRate);
                const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
                this.noise = buf;
                return this.ctx;
            },
            resume: function () {
                if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
            },
            noiseSource: function () {
                const s = this.ctx.createBufferSource();
                s.buffer = this.noise;
                return s;
            },

            // Фортепианная нота: реальный сэмпл концертного рояля, если пак
            // загружен; иначе — синтез-fallback (прежнее поведение), чтобы
            // воспроизведение работало даже без ассетов.
            playPiano: function (midi, when, durSec, velocity) {
                if (SampledPiano.noteOn(midi, when, durSec, velocity)) return;
                this.playPitch(440 * Math.pow(2, (midi - 69) / 12), when, durSec, velocity);
            },

            // Тон с ADSR-огибающей. ТОЧКА РАСШИРЕНИЯ ПОД SOUNDFONT: здесь
            // playPitch заменяется на воспроизведение AudioBuffer-сэмпла из
            // assets без правок планировщика и визуала.
            playPitch: function (freq, when, durSec, velocity) {
                const ctx = this.ctx; if (!ctx) return;
                const dur = Math.max(0.08, durSec);
                const vel = velocity == null ? 0.8 : velocity;
                const g = ctx.createGain();
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.value = Math.min(8000, freq * 6 + 800);
                const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = freq;
                const o2 = ctx.createOscillator(); o2.type = 'sine';     o2.frequency.value = freq * 2;
                const g2 = ctx.createGain(); g2.gain.value = 0.35; // обертон
                o1.connect(g); o2.connect(g2); g2.connect(g);
                g.connect(lp); lp.connect(this.master);
                const peak = 0.28 * vel;
                const end = when + dur;
                g.gain.setValueAtTime(0.0001, when);
                g.gain.exponentialRampToValueAtTime(peak, when + 0.008);
                g.gain.exponentialRampToValueAtTime(Math.max(0.0008, peak * 0.3), when + dur * 0.5);
                g.gain.exponentialRampToValueAtTime(0.0001, end);
                o1.start(when); o2.start(when);
                o1.stop(end + 0.03); o2.stop(end + 0.03);
            },

            // Удар: реальный сэмпл, если набор загружен; иначе синтез-fallback.
            playDrum: function (type, when, velocity) {
                if (SampledDrums.noteOn(type, when, velocity)) return;
                this._synthDrum(type, when, velocity);
            },

            // Синтез-fallback ударных (без сэмплов). Покрывает все 12 партий;
            // velocity масштабирует громкость.
            _synthDrum: function (type, when, velocity) {
                const ctx = this.ctx; if (!ctx) return;
                const vel = velocity == null ? 0.78 : velocity;
                if (type === 'kick') {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(160, when);
                    o.frequency.exponentialRampToValueAtTime(50, when + 0.12);
                    g.gain.setValueAtTime(0.9 * vel, when);
                    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.18);
                    o.connect(g); g.connect(this.master);
                    o.start(when); o.stop(when + 0.2);
                    return;
                }
                if (type === 'snare' || type === 'tom_high' || type === 'tom_mid' || type === 'tom_floor') {
                    const tone = { snare: 0, tom_high: 320, tom_mid: 240, tom_floor: 160 }[type];
                    const s = this.noiseSource(); const ng = ctx.createGain();
                    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
                    bp.frequency.value = type === 'snare' ? 1800 : 400;
                    s.connect(bp); bp.connect(ng); ng.connect(this.master);
                    const decay = type === 'snare' ? 0.18 : 0.12;
                    ng.gain.setValueAtTime((type === 'snare' ? 0.7 : 0.4) * vel, when);
                    ng.gain.exponentialRampToValueAtTime(0.0001, when + decay);
                    s.start(when); s.stop(when + 0.25);
                    if (tone) {
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.type = 'sine'; o.frequency.setValueAtTime(tone, when);
                        o.frequency.exponentialRampToValueAtTime(tone * 0.6, when + 0.18);
                        g.gain.setValueAtTime(0.6 * vel, when);
                        g.gain.exponentialRampToValueAtTime(0.0001, when + 0.22);
                        o.connect(g); g.connect(this.master);
                        o.start(when); o.stop(when + 0.24);
                    }
                    return;
                }
                // тарелки / хай-хэт: фильтрованный шум с разным затуханием
                const DEC = {
                    hihat_closed: 0.05, hihat_pedal: 0.09, hihat_open: 0.45,
                    ride: 0.5, ride_bell: 0.4, crash1: 0.9, crash2: 1.1,
                };
                const decay = DEC[type] != null ? DEC[type] : 0.5;
                const isHat = type.indexOf('hihat') === 0;
                const s = this.noiseSource(); const hp = ctx.createBiquadFilter();
                hp.type = 'highpass'; hp.frequency.value = isHat ? 7000 : 5000;
                const g = ctx.createGain();
                s.connect(hp); hp.connect(g); g.connect(this.master);
                g.gain.setValueAtTime((isHat ? 0.5 : 0.4) * vel, when);
                g.gain.exponentialRampToValueAtTime(0.0001, when + decay);
                s.start(when); s.stop(when + decay + 0.05);
                if (type === 'ride_bell') { // тональный «пинг» колокола
                    const o = ctx.createOscillator(); const og = ctx.createGain();
                    o.type = 'square'; o.frequency.value = 880;
                    og.gain.setValueAtTime(0.18 * vel, when);
                    og.gain.exponentialRampToValueAtTime(0.0001, when + 0.4);
                    o.connect(og); og.connect(this.master);
                    o.start(when); o.stop(when + 0.42);
                }
            },

            click: function (when, accent) {
                const ctx = this.ctx; if (!ctx) return;
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.type = 'square';
                o.frequency.value = accent ? 2000 : 1400;
                g.gain.setValueAtTime(0.0001, when);
                g.gain.exponentialRampToValueAtTime(accent ? 0.5 : 0.3, when + 0.001);
                g.gain.exponentialRampToValueAtTime(0.0001, when + 0.04);
                o.connect(g); g.connect(this.master);
                o.start(when); o.stop(when + 0.05);
            },
        };

        // --- Сэмплерный концертный рояль (реальные записи, оффлайн) --------
        // Multi-sample player на AudioBufferSourceNode. Атака молоточка, decay
        // и sustain заложены в самих сэмплах; между опорными нотами — питч-шифт
        // через playbackRate (≤1 полутона при сэмплировании по малым терциям).
        // Поддерживает velocity-слои, демпфер-педаль (sustain) и release-хвост.
        // Сэмплы (Salamander Grand Piano, CC-BY) кладёт tools/fetch_salamander.mjs;
        // раздаются локальным сервером — в рантайме сети нет.
        const SampledPiano = {
            ctx: null, master: null,
            ready: false, loading: false,
            zones: [], release: 0.4, sustain: false,
            voices: [], maxVoices: 64, gc: null,

            // Загрузка манифеста + декодирование сэмплов в AudioBuffer.
            load: function (ctx, master) {
                if (this.ready || this.loading) return Promise.resolve(this.ready);
                this.ctx = ctx; this.master = master; this.loading = true;
                const self = this;
                return fetch('piano/manifest.json', { cache: 'force-cache' })
                    .then(function (r) { if (!r.ok) throw new Error('нет manifest.json'); return r.json(); })
                    .then(function (man) {
                        self.release = man.release != null ? man.release : 0.4;
                        const base = man.basePath || 'piano/';
                        const zones = man.zones || [];
                        return Promise.all(zones.map(function (z) {
                            return fetch(base + z.file)
                                .then(function (r) { if (!r.ok) throw new Error(z.file); return r.arrayBuffer(); })
                                .then(function (ab) { return ctx.decodeAudioData(ab); })
                                .then(function (buf) {
                                    return {
                                        rootMidi: z.rootMidi,
                                        loMidi: z.loMidi != null ? z.loMidi : 0,
                                        hiMidi: z.hiMidi != null ? z.hiMidi : 127,
                                        loVel: z.loVel != null ? z.loVel : 0,
                                        hiVel: z.hiVel != null ? z.hiVel : 127,
                                        buffer: buf,
                                    };
                                });
                        }));
                    })
                    .then(function (loaded) {
                        self.zones = loaded;
                        self.ready = loaded.length > 0;
                        self.loading = false;
                        console.log('SampledPiano: загружено зон ' + loaded.length);
                        return self.ready;
                    })
                    .catch(function (e) {
                        self.loading = false; self.ready = false;
                        console.log('SampledPiano недоступен, синтез-fallback: ' + e.message);
                        return false;
                    });
            },

            isReady: function () { return this.ready; },

            // Демпфер-педаль: при отпускании глушит ноты, державшиеся педалью.
            setSustain: function (on) {
                this.sustain = !!on;
                if (!this.sustain && this.ctx) {
                    const now = this.ctx.currentTime;
                    for (let i = 0; i < this.voices.length; i++) {
                        const v = this.voices[i];
                        if (v.held && !v.releasing) this._release(v, now);
                    }
                }
            },

            // Выбор зоны: подходящий velocity-слой, затем ближайший корень.
            _pick: function (midi, vel) {
                let best = null, bestD = 1e9;
                for (let i = 0; i < this.zones.length; i++) {
                    const z = this.zones[i];
                    if (vel < z.loVel || vel > z.hiVel) continue;
                    if (midi < z.loMidi || midi > z.hiMidi) continue;
                    const d = Math.abs(midi - z.rootMidi);
                    if (d < bestD) { bestD = d; best = z; }
                }
                if (best) return best;
                for (let i = 0; i < this.zones.length; i++) {
                    const d = Math.abs(midi - this.zones[i].rootMidi);
                    if (d < bestD) { bestD = d; best = this.zones[i]; }
                }
                return best;
            },

            // Сэмпл-точный note-on. Возвращает false, если пак не готов —
            // тогда вызывающий уходит в синтез-fallback.
            noteOn: function (midi, when, durSec, velocity) {
                const ctx = this.ctx; if (!ctx || !this.ready) return false;
                const vel = Math.max(1, Math.min(127,
                    Math.round((velocity == null ? 0.78 : velocity) * 127)));
                const z = this._pick(midi, vel); if (!z) return false;
                if (this.voices.length >= this.maxVoices) {
                    this._release(this.voices[0], ctx.currentTime); // кража голоса
                }
                const src = ctx.createBufferSource();
                src.buffer = z.buffer;
                src.playbackRate.value = Math.pow(2, (midi - z.rootMidi) / 12);
                const g = ctx.createGain();
                g.gain.value = 0.2 + 0.6 * (vel / 127); // громкость по velocity
                src.connect(g); g.connect(this.master);
                src.start(when);
                const voice = {
                    src: src, g: g, midi: midi,
                    releaseAt: when + Math.max(0.05, durSec),
                    held: false, releasing: false, dead: false,
                };
                src.onended = function () { voice.dead = true; };
                this.voices.push(voice);
                this._ensureGc();
                return true;
            },

            // Спад после «отпускания клавиши» (или педали) + остановка источника.
            _release: function (voice, t) {
                if (voice.releasing) return;
                voice.releasing = true;
                const g = voice.g.gain;
                try {
                    g.cancelScheduledValues(t);
                    g.setValueAtTime(Math.max(0.0001, g.value), t);
                    g.setTargetAtTime(0.0001, t, this.release / 3);
                } catch (e) { /* no-op */ }
                try { voice.src.stop(t + this.release + 0.3); } catch (e) { /* no-op */ }
            },

            // Housekeeping-таймер: НЕ музыкальный планировщик. Снимает ноты по
            // истечении длительности (с учётом педали) и чистит отыгравшие
            // голоса. Тайминг note-on остаётся сэмпл-точным.
            _ensureGc: function () {
                if (this.gc) return;
                const self = this;
                this.gc = setInterval(function () {
                    const ctx = self.ctx; if (!ctx) return;
                    const now = ctx.currentTime;
                    for (let i = self.voices.length - 1; i >= 0; i--) {
                        const v = self.voices[i];
                        if (v.dead) { self.voices.splice(i, 1); continue; }
                        if (!v.releasing && now >= v.releaseAt) {
                            if (self.sustain) v.held = true;     // педаль держит ноту
                            else self._release(v, now);
                        }
                    }
                    if (self.voices.length === 0) { clearInterval(self.gc); self.gc = null; }
                }, 30);
            },

            // Немедленно оборвать всё (стоп/пауза плеера).
            stopAll: function () {
                const now = this.ctx ? this.ctx.currentTime : 0;
                for (let i = 0; i < this.voices.length; i++) {
                    try { this.voices[i].src.stop(now); } catch (e) { /* no-op */ }
                }
                this.voices = [];
                if (this.gc) { clearInterval(this.gc); this.gc = null; }
            },
        };

        // --- Сэмплерная ударная установка (реальные записи, оффлайн) -------
        // Sample-based engine на AudioBufferSourceNode: у каждого инструмента
        // velocity-слои (pp/mf/ff и больше). Полифония БЕЗ обрезания хвостов —
        // тарелки звучат до естественного затухания. Choke-группы гасят
        // открытый хай-хэт при закрытом/педальном ударе. Тембр — в самих
        // сэмплах (никакого синтеза) → нет эффекта «драм-машины».
        // Сэмплы кладёт tools/fetch_drums.mjs; раздаются локальным сервером.
        const SampledDrums = {
            ctx: null, master: null,
            ready: false, loading: false,
            kit: {},            // type -> { group, layers:[{loVel,hiVel,buffer}] }
            voices: [], maxVoices: 64, gc: null,

            load: function (ctx, master) {
                if (this.ready || this.loading) return Promise.resolve(this.ready);
                this.ctx = ctx; this.master = master; this.loading = true;
                const self = this;
                return fetch('drums/manifest.json', { cache: 'force-cache' })
                    .then(function (r) { if (!r.ok) throw new Error('нет drums/manifest.json'); return r.json(); })
                    .then(function (man) {
                        const base = man.basePath || 'drums/';
                        const insts = man.instruments || {};
                        const kit = {};
                        const tasks = [];
                        Object.keys(insts).forEach(function (type) {
                            const def = insts[type];
                            kit[type] = { group: def.group || null, layers: [] };
                            (def.layers || []).forEach(function (L) {
                                const entry = {
                                    loVel: L.loVel != null ? L.loVel : 0,
                                    hiVel: L.hiVel != null ? L.hiVel : 127,
                                    buffer: null,
                                };
                                kit[type].layers.push(entry);
                                tasks.push(fetch(base + L.file)
                                    .then(function (r) { if (!r.ok) throw new Error(L.file); return r.arrayBuffer(); })
                                    .then(function (ab) { return ctx.decodeAudioData(ab); })
                                    .then(function (buf) { entry.buffer = buf; })
                                    .catch(function () { /* отсутствующий слой -> пропуск */ }));
                            });
                        });
                        return Promise.all(tasks).then(function () { return kit; });
                    })
                    .then(function (kit) {
                        self.kit = kit;
                        self.ready = Object.keys(kit).some(function (t) {
                            return kit[t].layers.some(function (L) { return L.buffer; });
                        });
                        self.loading = false;
                        console.log('SampledDrums: инструментов ' + Object.keys(kit).length +
                            ', готов: ' + self.ready);
                        return self.ready;
                    })
                    .catch(function (e) {
                        self.loading = false; self.ready = false;
                        console.log('SampledDrums недоступен, синтез-fallback: ' + e.message);
                        return false;
                    });
            },

            isReady: function () { return this.ready; },

            // Выбор velocity-слоя: по диапазону, иначе ближайший с буфером.
            _pickLayer: function (inst, vel) {
                const layers = inst.layers;
                for (let i = 0; i < layers.length; i++) {
                    const L = layers[i];
                    if (L.buffer && vel >= L.loVel && vel <= L.hiVel) return L;
                }
                let best = null, bestD = 1e9;
                for (let i = 0; i < layers.length; i++) {
                    const L = layers[i];
                    if (!L.buffer) continue;
                    const d = Math.abs(vel - (L.loVel + L.hiVel) / 2);
                    if (d < bestD) { bestD = d; best = L; }
                }
                return best;
            },

            // Гасит звучащие голоса той же choke-группы (открытый хай-хэт при
            // закрытом ударе). Короткий фейд — без щелчка.
            _choke: function (group, when) {
                for (let i = 0; i < this.voices.length; i++) {
                    const v = this.voices[i];
                    if (v.group !== group || v.choked) continue;
                    v.choked = true;
                    try {
                        const g = v.g.gain;
                        g.cancelScheduledValues(when);
                        g.setValueAtTime(Math.max(0.0001, g.value), when);
                        g.exponentialRampToValueAtTime(0.0001, when + 0.04);
                        v.src.stop(when + 0.06);
                    } catch (e) { /* no-op */ }
                }
            },

            // Сэмпл-точный удар. false -> вызывающий уходит в синтез-fallback.
            noteOn: function (type, when, velocity) {
                const ctx = this.ctx; if (!ctx || !this.ready) return false;
                const inst = this.kit[type]; if (!inst) return false;
                const vel = Math.max(1, Math.min(127,
                    Math.round((velocity == null ? 0.78 : velocity) * 127)));
                const L = this._pickLayer(inst, vel); if (!L || !L.buffer) return false;
                if (inst.group) this._choke(inst.group, when);
                if (this.voices.length >= this.maxVoices) {
                    try { this.voices[0].src.stop(when); } catch (e) { /* no-op */ }
                    this.voices.shift();
                }
                const src = ctx.createBufferSource();
                src.buffer = L.buffer;
                const g = ctx.createGain();
                g.gain.value = 0.35 + 0.65 * (vel / 127); // громкость по velocity
                src.connect(g); g.connect(this.master);
                src.start(when);                          // хвост звучит ЦЕЛИКОМ
                const voice = { src: src, g: g, group: inst.group, choked: false, dead: false };
                src.onended = function () { voice.dead = true; };
                this.voices.push(voice);
                this._ensureGc();
                return true;
            },

            _ensureGc: function () {
                if (this.gc) return;
                const self = this;
                this.gc = setInterval(function () {
                    for (let i = self.voices.length - 1; i >= 0; i--) {
                        if (self.voices[i].dead) self.voices.splice(i, 1);
                    }
                    if (self.voices.length === 0) { clearInterval(self.gc); self.gc = null; }
                }, 50);
            },

            stopAll: function () {
                const now = this.ctx ? this.ctx.currentTime : 0;
                for (let i = 0; i < this.voices.length; i++) {
                    try { this.voices[i].src.stop(now); } catch (e) { /* no-op */ }
                }
                this.voices = [];
                if (this.gc) { clearInterval(this.gc); this.gc = null; }
            },
        };

        function ensureHighlightLayer() {
            let layer = el('note-highlights');
            if (!layer) {
                layer = document.createElement('div');
                layer.id = 'note-highlights';
                el('notation-container').appendChild(layer);
            }
            return layer;
        }

        // --- Транспорт: scheduler + note-synced playhead + подсветка -------
        const Playback = {
            playing: false,
            comp: null,
            metronome: false,
            secPerQuarter: 0.5,
            startTime: 0,        // ctx.currentTime в момент beat 0
            lookahead: null,     // setInterval-«насос» упреждения
            raf: null,
            nextEvent: 0,        // указатель в comp.events
            nextClickBeat: 0,    // следующая доля метронома (в долях такта)
            xmap: [],            // beat->X по строкам (playhead по муз. времени)
            _hl: {},             // активные элементы подсветки по noteId

            isPlaying: function () { return this.playing; },
            setMetronome: function (on) { this.metronome = !!on; },

            currentBeat: function () {
                const ctx = AudioEngine.ctx;
                if (!ctx) return 0;
                return (ctx.currentTime - this.startTime) / this.secPerQuarter;
            },
            secForBeat: function (q) { return this.startTime + q * this.secPerQuarter; },

            // Карта «музыкальное время -> X» для КАЖДОЙ строки Grand Staff.
            // Якоря берём из onset'ов ОБОИХ голосов (и пауз — у них тоже есть
            // bbox), поэтому при длинной ноте в одной руке движение второй даёт
            // промежуточные точки и playhead не «застывает». Одновременные
            // onset'ы (аккорд / treble+bass на одной доле) усредняются в один X.
            // Замыкающий якорь ставим у правого барлайна строки.
            _buildXMap: function () {
                const lay = lastLayout;
                const rows = lay ? lay.rows : 1;
                const perRow = lay ? lay.perRow : 1;
                const margin = lay ? lay.margin : 8;
                const measureQ = this.comp.measureQ || 4;
                const totalMeasures = Math.max(1, Math.round(this.comp.totalBeats / measureQ));
                const measureW = lay ? (lay.width - 2 * margin) / perRow : 0;

                const byRow = [];
                for (let r = 0; r < rows; r++) byRow.push({});

                const ev = this.comp.events;
                for (let i = 0; i < ev.length; i++) {
                    const e = ev[i];
                    const hb = noteHitIndex[e.noteId];
                    if (!hb) continue;
                    const mIdx = Math.floor(e.startBeat / measureQ + 1e-6);
                    const row = Math.floor(mIdx / perRow);
                    if (row < 0 || row >= rows) continue;
                    const slot = byRow[row];
                    const key = e.startBeat.toFixed(4);
                    if (!slot[key]) slot[key] = { beat: e.startBeat, sum: 0, n: 0 };
                    slot[key].sum += hb.x + hb.w / 2;
                    slot[key].n++;
                }

                const xmap = [];
                for (let r = 0; r < rows; r++) {
                    const arr = [];
                    const slot = byRow[r];
                    for (const key in slot)
                        arr.push({ beat: slot[key].beat, x: slot[key].sum / slot[key].n });
                    arr.sort(function (a, b) { return a.beat - b.beat; });

                    // правый барлайн последнего такта строки — куда доезжает
                    // линия на долгих нотах в конце системы
                    const lastM = Math.min((r + 1) * perRow, totalMeasures) - 1;
                    if (lastM >= r * perRow) {
                        const rowEndBeat = (lastM + 1) * measureQ;
                        const rightX = margin + ((lastM % perRow) + 1) * measureW - 6;
                        if (arr.length === 0 || arr[arr.length - 1].beat < rowEndBeat - 1e-6)
                            arr.push({ beat: rowEndBeat, x: rightX });
                    }
                    xmap.push(arr);
                }
                this.xmap = xmap;
            },

            // вызывается из render(): пересобрать события под правки в редакторе
            onRender: function () {
                if (!this.playing || !lastPayload) return;
                const curBeat = this.currentBeat();
                this.comp = compilePlayback(lastPayload);
                this._buildXMap();
                this.nextEvent = 0;
                while (this.nextEvent < this.comp.events.length &&
                       this.comp.events[this.nextEvent].startBeat < curBeat) this.nextEvent++;
            },

            start: function (payload, tempo) {
                if (!payload) return;
                const ctx = AudioEngine.ensure();
                if (!ctx) { showError('Web Audio недоступен в этом WebView.'); return; }
                AudioEngine.resume();
                this.stop(true); // сброс прежней сессии без снятия активности UI
                this.secPerQuarter = 60 / (Number(tempo) || 120);
                this.comp = compilePlayback(payload);
                this._buildXMap();
                if (this.comp.events.length === 0) return;
                this.playing = true;
                this.nextEvent = 0;
                this.nextClickBeat = 0;
                this.startTime = ctx.currentTime + 0.08; // запас на планирование
                el('playhead').classList.add('active');
                const self = this;
                this.lookahead = setInterval(function () { self._schedule(); }, 25);
                this._schedule();
                this.raf = requestAnimationFrame(function () { self._frame(); });
            },

            _schedule: function () {
                const ctx = AudioEngine.ctx; if (!ctx || !this.playing) return;
                const horizon = ctx.currentTime + 0.12;
                const ev = this.comp.events;

                while (this.nextEvent < ev.length &&
                       this.secForBeat(ev[this.nextEvent].startBeat) < horizon) {
                    const e = ev[this.nextEvent];
                    const when = Math.max(ctx.currentTime, this.secForBeat(e.startBeat));
                    if (!e.rest && e.keys.length) {
                        if (this.comp.isDrums) {
                            for (let k = 0; k < e.keys.length; k++)
                                AudioEngine.playDrum(drumType(e.keys[k]), when, e.velocity);
                        } else {
                            const durS = e.durationBeats * this.secPerQuarter;
                            for (let k = 0; k < e.keys.length; k++)
                                AudioEngine.playPiano(keyToMidi(e.keys[k]), when, durS, e.velocity);
                        }
                    }
                    this.nextEvent++;
                }

                // метроном: доля = 4/beatValue четвертей, акцент на доле 0 такта.
                // Счётчик двигаем всегда — звучит только при включённом метрономе.
                const beatQ = 4 / this.comp.beatValue;
                while (this.nextClickBeat * beatQ <= this.comp.totalBeats &&
                       this.secForBeat(this.nextClickBeat * beatQ) < horizon) {
                    if (this.metronome) {
                        const when = this.secForBeat(this.nextClickBeat * beatQ);
                        if (when >= ctx.currentTime) {
                            const accent = (this.nextClickBeat % this.comp.beats) === 0;
                            AudioEngine.click(when, accent);
                        }
                    }
                    this.nextClickBeat++;
                }

                if (this.nextEvent >= ev.length &&
                    ctx.currentTime > this.secForBeat(this.comp.totalBeats) + 0.05) {
                    this.stop();
                    if (window.flutter_inappwebview)
                        window.flutter_inappwebview.callHandler('onPlaybackEnded');
                }
            },

            _frame: function () {
                if (!this.playing) return;
                const curBeat = this.currentBeat();
                this._positionPlayhead(curBeat);
                this._highlight(curBeat);
                const self = this;
                this.raf = requestAnimationFrame(function () { self._frame(); });
            },

            // Позиция playhead = музыкальное время (curBeat), а НЕ последняя
            // сыгранная нота. Строку определяем по такту текущей доли, X —
            // интерполяцией между beat-якорями строки (онсеты обоих голосов).
            _positionPlayhead: function (curBeat) {
                const ph = el('playhead');
                if (!this.xmap || !this.xmap.length) return;
                const measureQ = this.comp.measureQ || 4;
                const total = this.comp.totalBeats;
                const perRow = lastLayout ? lastLayout.perRow : 1;
                const totalMeasures = Math.max(1, Math.round(total / measureQ));

                const b = Math.max(0, Math.min(curBeat, total));
                let mIdx = Math.floor(b / measureQ + 1e-6);
                if (mIdx >= totalMeasures) mIdx = totalMeasures - 1;
                if (mIdx < 0) mIdx = 0;
                const row = Math.floor(mIdx / perRow);
                const anchors = this.xmap[row];
                if (!anchors || anchors.length === 0) return;

                let x;
                if (b <= anchors[0].beat) {
                    x = anchors[0].x;
                } else if (b >= anchors[anchors.length - 1].beat) {
                    x = anchors[anchors.length - 1].x;
                } else {
                    let k = 0;
                    while (k + 1 < anchors.length && anchors[k + 1].beat <= b) k++;
                    const a = anchors[k], c = anchors[k + 1];
                    const span = c.beat - a.beat;
                    const frac = span > 0 ? (b - a.beat) / span : 0;
                    x = a.x + frac * (c.x - a.x);
                }

                const rowH = lastLayout ? lastLayout.rowH : 200;
                const margin = lastLayout ? lastLayout.margin : 8;
                ph.style.left = (PAD + x) + 'px';
                ph.style.top = (PAD + margin + row * rowH) + 'px';
                ph.style.height = (rowH - 8) + 'px';
            },

            _highlight: function (curBeat) {
                const layer = ensureHighlightLayer();
                const active = {};
                const ev = this.comp.events;
                for (let i = 0; i < ev.length; i++) {
                    const e = ev[i];
                    if (e.startBeat > curBeat) break; // отсортировано по началу
                    if (e.rest || !e.keys.length) continue;
                    if (curBeat < e.startBeat + e.durationBeats) active[e.noteId] = true;
                }
                for (const id in this._hl) {
                    if (!active[id]) {
                        if (this._hl[id].parentNode) layer.removeChild(this._hl[id]);
                        delete this._hl[id];
                    }
                }
                for (const id in active) {
                    if (this._hl[id]) continue;
                    const hb = noteHitIndex[id];
                    if (!hb) continue;
                    const d = document.createElement('div');
                    d.className = 'note-hl';
                    d.style.left = (PAD + hb.x - 3) + 'px';
                    d.style.top = (PAD + hb.y - 3) + 'px';
                    d.style.width = (hb.w + 6) + 'px';
                    d.style.height = (hb.h + 6) + 'px';
                    layer.appendChild(d);
                    this._hl[id] = d;
                }
            },

            stop: function (keepActive) {
                if (this.lookahead) { clearInterval(this.lookahead); this.lookahead = null; }
                if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }
                if (!keepActive) {
                    this.playing = false;
                    el('playhead').classList.remove('active');
                    const layer = el('note-highlights');
                    if (layer) layer.innerHTML = '';
                    this._hl = {};
                    try { SampledPiano.stopAll(); } catch (e) { /* no-op */ }
                    try { SampledDrums.stopAll(); } catch (e) { /* no-op */ }
                }
            },
        };

        // =================================================================
        //  Промышленная постраничная вёрстка A4 (Justification)
        //  Слой поверх спейсинга VexFlow: минимальные ширины тактов берём из
        //  Formatter.preCalculateMinTotalWidth (нелинейный спейсинг по
        //  длительностям заложен в движке), а системную/страничную пагинацию
        //  и выравнивание по обоим краям считаем сами — этого слоя в VexFlow
        //  нет (как layout-слой над спейсингом в MuseScore).
        // =================================================================
        const PAGE = { W: 794, H: 1123, mx: 56, mtop: 72, mbot: 56 }; // A4 @96dpi
        const MEASURE_PAD = 16;    // правый запас в такте (дыхание/барлайн)
        const SYS_GAP_MIN = 12;    // мин. интервал между системами
        const SYS_GAP_MAX = 40;    // потолок интервала (плотная вёрстка)
        const NOTE_RIGHT_PAD = 10; // запас справа от последней ноты

        function printW() { return PAGE.W - 2 * PAGE.mx; }
        function printH() { return PAGE.H - PAGE.mtop - PAGE.mbot; }

        // Конфигурация станов под инструмент.
        function layoutConfig(instrument) {
            if (instrument === 'drums') {
                return {
                    grand: false,
                    staves: [{ voice: 'perc', clef: 'percussion', dy: 0 }],
                    keySig: false,
                    systemHeight: 96,
                };
            }
            return {
                grand: true,
                staves: [
                    { voice: 'treble', clef: 'treble', dy: 0 },
                    { voice: 'bass', clef: 'bass', dy: 82 },
                ],
                keySig: true,
                systemHeight: 172,
            };
        }

        function newPage(root) {
            const div = document.createElement('div');
            div.className = 'pf-page';
            root.appendChild(div);
            const r = new Vex.Flow.Renderer(div, Vex.Flow.Renderer.Backends.SVG);
            r.resize(PAGE.W, PAGE.H);
            return r.getContext();
        }

        // Минимальная структурная ширина содержимого такта (без модификаторов).
        function measureMinWidth(VF, voices) {
            const f = new VF.Formatter();
            voices.forEach(function (v) { f.joinVoices([v]); });
            return f.preCalculateMinTotalWidth(voices);
        }

        // Ширина «головы» стана: ключ + ключевые знаки [+ размер].
        function headWidth(VF, ctx, cfg, keySig, timeSig, withTime) {
            const s = new VF.Stave(0, 0, 400);
            s.addClef(cfg.staves[0].clef);
            if (cfg.keySig && keySig) s.addKeySignature(keySig);
            if (withTime && timeSig) s.addTimeSignature(timeSig);
            s.setContext(ctx);
            s.format();
            return s.getNoteStartX() - s.getX();
        }

        function textWidth(ctx, str, approxCharW) {
            try {
                const w = ctx.measureText(str).width;
                if (w && w > 0) return w;
            } catch (e) { /* fallthrough */ }
            return str.length * (approxCharW || 8);
        }

        function drawTitle(ctx, title, composer) {
            ctx.save();
            ctx.setFont('serif', 22, 'bold');
            ctx.fillText(title, (PAGE.W - textWidth(ctx, title, 12)) / 2, PAGE.mtop - 34);
            if (composer) {
                ctx.setFont('serif', 13, '');
                ctx.fillText(composer,
                    PAGE.W - PAGE.mx - textWidth(ctx, composer, 7), PAGE.mtop - 14);
            }
            ctx.restore();
        }

        // Отрисовка одной системы (строки) на странице.
        function drawSystem(VF, ctx, sys, measures, cfg, yTop, beats, beatValue,
                            keySig, timeSig) {
            let x = PAGE.mx;
            sys.items.forEach(function (idx, pos) {
                const isFirst = (pos === 0);
                const withTime = isFirst && sys.firstMeasure === 0;
                const content = sys.widths[idx];
                const staveW = (isFirst ? sys.L : 0) + content;

                // Свежие голоса под отрисовку (ноты нельзя переиспользовать).
                const voices = cfg.staves.map(function (st) {
                    return buildVoice(VF, measures[idx][st.voice] || [], st.clef,
                        beats, beatValue, -1, -1, st.voice);
                });

                // Станы такта.
                const staves = cfg.staves.map(function (st) {
                    const stave = new VF.Stave(x, yTop + st.dy, staveW);
                    if (isFirst) {
                        stave.addClef(st.clef);
                        if (cfg.keySig && keySig) stave.addKeySignature(keySig);
                        if (withTime && timeSig) stave.addTimeSignature(timeSig);
                    }
                    stave.setContext(ctx);
                    stave.format();
                    return stave;
                });

                // Единый старт нот по всем станам системы (вертикальное выравнивание).
                let startX = x;
                staves.forEach(function (s) { startX = Math.max(startX, s.getNoteStartX()); });
                staves.forEach(function (s) { s.setNoteStartX(startX); });
                const contentW = Math.max(40, (x + staveW) - startX - NOTE_RIGHT_PAD);

                // Один форматтер на такт — ноты разных станов выравниваются по тактам.
                const f = new VF.Formatter();
                voices.forEach(function (v) { f.joinVoices([v]); });
                f.format(voices, contentW);

                staves.forEach(function (s) { s.draw(); });
                voices.forEach(function (v, si) {
                    // Балки создаём ДО отрисовки нот: тогда у забимованных нот
                    // не рисуются одиночные флажки (хвосты).
                    const beams = VF.Beam.generateBeams(v.getTickables(), {
                        groups: beamGroups(VF, beats, beatValue),
                        beam_rests: false,
                        maintain_stem_directions: true,
                    });
                    v.draw(ctx, staves[si]);
                    beams.forEach(function (b) { b.setContext(ctx).draw(); });
                });

                // Системная скобка + левая линия (клавишные).
                if (isFirst && cfg.grand) {
                    new VF.StaveConnector(staves[0], staves[1])
                        .setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
                    new VF.StaveConnector(staves[0], staves[1])
                        .setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();
                }

                // Номер первого такта системы — вплотную НАД верхней линией
                // верхнего стана. Первый такт пьесы не нумеруем.
                if (isFirst && sys.firstMeasure > 0) {
                    const topStave = staves[0];
                    ctx.save();
                    ctx.setFont('sans-serif', 11, '');
                    ctx.fillText(String(sys.firstMeasure + 1),
                        x + 1, topStave.getYForLine(0) - 4);
                    ctx.restore();
                }

                x += staveW;
            });
        }

        // Главный вход постраничной вёрстки: строит страницы A4 в #print-root,
        // возвращает их количество.
        function renderPrintPages(score) {
            const VF = Vex.Flow;
            const root = el('print-root');
            root.innerHTML = '';

            const tsParts = (score.timeSignature || '4/4').split('/');
            const beats = parseInt(tsParts[0], 10) || 4;
            const beatValue = parseInt(tsParts[1], 10) || 4;
            const instrument = score.instrument === 'drums' ? 'drums' : 'piano';
            const cfg = layoutConfig(instrument);
            const measures = score.measures || [];
            const keySig = cfg.keySig ? (score.keySignature || 'C') : null;
            const timeSig = score.timeSignature || (beats + '/' + beatValue);
            if (measures.length === 0) return 0;

            // --- проход 1: минимальные ширины тактов ---
            const cm = [];
            for (let i = 0; i < measures.length; i++) {
                const vs = cfg.staves.map(function (st) {
                    return buildVoice(VF, measures[i][st.voice] || [], st.clef,
                        beats, beatValue, -1, -1, st.voice);
                });
                cm.push(Math.max(48, measureMinWidth(VF, vs)));
            }

            // первая страница + замер ширин «головы» стана
            const ctx0 = newPage(root);
            const clefKeyW = headWidth(VF, ctx0, cfg, keySig, timeSig, false);
            const timeExtra = headWidth(VF, ctx0, cfg, keySig, timeSig, true) - clefKeyW;

            // --- проход 2: разбиение на системы ---
            const W = printW();
            const systems = [];
            let i = 0;
            while (i < measures.length) {
                const sys = { items: [], firstMeasure: i, L: clefKeyW + (i === 0 ? timeExtra : 0) };
                let used = sys.L;
                while (i < measures.length) {
                    const add = cm[i] + MEASURE_PAD;
                    if (sys.items.length > 0 && used + add > W) break;
                    sys.items.push(i);
                    used += add;
                    i++;
                }
                systems.push(sys);
            }

            // --- проход 3: горизонтальный justify ---
            systems.forEach(function (sys, si) {
                const budget = W - sys.L;
                const sumCm = sys.items.reduce(function (a, k) { return a + cm[k]; }, 0);
                const natural = sumCm + sys.items.length * MEASURE_PAD;
                const isLast = si === systems.length - 1;
                let delta = budget - natural;
                if (delta < 0) delta = 0;
                const justify = !(isLast && natural / budget < 0.5);
                sys.widths = {};
                sys.items.forEach(function (k) {
                    let cw = cm[k] + MEASURE_PAD;
                    if (justify && sumCm > 0) cw += delta * (cm[k] / sumCm);
                    sys.widths[k] = cw;
                });
            });

            // --- проход 4: страничная раскладка (вертикальный justify) ---
            const Hh = printH();
            const sysH = cfg.systemHeight;
            const perPage = Math.max(1,
                Math.floor((Hh + SYS_GAP_MIN) / (sysH + SYS_GAP_MIN)));
            const pages = [];
            for (let s = 0; s < systems.length; s += perPage) {
                pages.push(systems.slice(s, s + perPage));
            }

            for (let p = 0; p < pages.length; p++) {
                const pageSystems = pages[p];
                const ctx = (p === 0) ? ctx0 : newPage(root);
                const n = pageSystems.length;
                const isLastPage = p === pages.length - 1;

                let headOffset = 0;
                if (p === 0 && score.title) {
                    drawTitle(ctx, score.title, score.composer);
                    headOffset = score.composer ? 16 : 4;
                }
                const budgetH = Hh - headOffset;

                let gap;
                if (n > 1 && !isLastPage) {
                    gap = (budgetH - n * sysH) / (n - 1);
                    gap = Math.max(SYS_GAP_MIN, Math.min(SYS_GAP_MAX, gap));
                } else {
                    gap = SYS_GAP_MIN;
                }

                let y = PAGE.mtop + headOffset;
                for (let k = 0; k < n; k++) {
                    drawSystem(VF, ctx, pageSystems[k], measures, cfg, y,
                        beats, beatValue, keySig, timeSig);
                    y += sysH + gap;
                }
            }

            return pages.length;
        }

        // =================================================================
        //  Публичный мост (вызывается из Flutter)
        // =================================================================

        // Принимает base64(UTF-8 JSON) — безопасно для evaluateJavascript.
        window.ScoreFlow = {
            renderB64: function (b64) {
                try {
                    const json = decodeURIComponent(escape(window.atob(b64)));
                    lastPayload = JSON.parse(json);
                    render(lastPayload);
                } catch (e) {
                    showError('Ошибка разбора партитуры: ' + e.message);
                }
            },

            // Верстает партитуру по страницам A4 в #print-root (вектор) и
            // возвращает их число. Печать инициирует Flutter через
            // printCurrentPage() — @media print покажет именно эти страницы.
            renderPrintB64: function (b64) {
                try {
                    const json = decodeURIComponent(escape(window.atob(b64)));
                    const score = JSON.parse(json);
                    return renderPrintPages(score);
                } catch (e) {
                    showError('Ошибка вёрстки печати: ' + e.message);
                    return 0;
                }
            },

            // Метроном: вкл/выкл. Состояние сохраняется между запусками плеера.
            setMetronome: function (on) {
                try { Playback.setMetronome(on); } catch (e) { /* no-op */ }
            },

            // Предзагрузка сэмплов концертного рояля (локальный сервер, оффлайн).
            // Идемпотентно: повторные вызовы безопасны. Без сэмплов плеер
            // продолжит работать на синтез-fallback.
            loadPiano: function () {
                const ctx = AudioEngine.ensure();
                if (ctx) SampledPiano.load(ctx, AudioEngine.master);
            },

            // Демпфер-педаль (sustain): держит звучащие ноты до отпускания.
            setSustain: function (on) {
                try { SampledPiano.setSustain(on); } catch (e) { /* no-op */ }
            },

            // Предзагрузка сэмплов ударной установки (локальный сервер, оффлайн).
            // Идемпотентно. Без сэмплов плеер играет синтез-fallback.
            loadDrums: function () {
                const ctx = AudioEngine.ensure();
                if (ctx) SampledDrums.load(ctx, AudioEngine.master);
            },
        };

        // Контракт плеера сохранён: 'PLAY' (с tempo) запускает воспроизведение
        // текущей партитуры с начала, 'PAUSE' останавливает.
        window.handlePlaybackCommand = function (action, value) {
            if (action === 'PLAY') {
                Playback.start(lastPayload, value);
            } else if (action === 'PAUSE') {
                Playback.stop();
            }
        };

        // Мост Flutter готов.
        window.addEventListener('flutterInAppWebViewPlatformReady', function () {
            console.log('Flutter WebView Bridge Connected.');
        });

        // Перерисовка под новую ширину (поворот экрана / смена вида).
        let resizeTimer = null;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                if (lastPayload) render(lastPayload);
            }, 180);
        });
    })();
    </script>
</body>
</html>
