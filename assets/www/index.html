<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreFlow Engine</title>

    <!-- Локальный (offline) движок нотного рендеринга. Грузится через
         InAppLocalhostServer, поэтому относительный путь резолвится. -->
    <script src="js/vexflow.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #notation-container {
            position: relative;
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }
        #notation-container svg { display: block; }
        #playhead {
            position: absolute;
            top: 8px;
            width: 2px;
            background-color: rgba(33, 150, 243, 0.85);
            opacity: 0;
            transition: opacity 0.12s ease;
            pointer-events: none;
        }
        #playhead.active { opacity: 1; }

        /* Слой подсветки звучащих нот (поверх SVG, не перехватывает клики). */
        #note-highlights {
            position: absolute;
            left: 0; top: 0;
            pointer-events: none;
        }
        .note-hl {
            position: absolute;
            background: rgba(33, 150, 243, 0.22);
            border-radius: 3px;
            pointer-events: none;
        }
        /* Подсветка выделения при наборе лиги фразировки (slur). Иной цвет,
           чтобы отличать от синей подсветки звучащих нот при playback. */
        .note-sel {
            position: absolute;
            background: rgba(76, 175, 80, 0.28);
            border-radius: 3px;
            pointer-events: none;
        }
        #engine-error {
            padding: 16px;
            color: #c62828;
            font-size: 14px;
            text-align: center;
        }

        /* Постраничная вёрстка A4. На экране уносим за пределы вьюпорта, но
           НЕ через display:none — иначе measureText/getBBox вернут 0 и текст
           (заголовок) не отцентрируется. При печати возвращаем на место. */
        #print-root { position: fixed; left: -10000px; top: 0; }
        .pf-page {
            width: 794px;
            height: 1123px;
            position: relative;
            margin: 0 auto;
            background: #ffffff;
            overflow: hidden;
        }
        @media print {
            @page { size: A4; margin: 0; }
            html, body { background: #ffffff; }
            #notation-container { display: none !important; }
            #print-root { position: static; left: auto; }
            .pf-page {
                margin: 0;
                page-break-after: always;
                break-after: page;
            }
            .pf-page:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body>
    <div id="notation-container">
        <div id="playhead"></div>
    </div>

    <!-- Контейнер постраничной вёрстки A4 (виден только при печати) -->
    <div id="print-root"></div>

    <script type="module">
    // =====================================================================
    //  ScoreFlow notation engine — data-driven VexFlow renderer + JS bridge
    // =====================================================================
    import { AudioEngine } from './js/audio/audio_engine.js';
    import { SampledPiano } from './js/audio/sampled_piano.js';
    import { SampledDrums } from './js/audio/sampled_drums.js';
    import { state } from './js/utils/state.js';
    import { el, showError, PAD } from './js/utils/dom.js';
    import { durationBeats } from './js/domain/durations.js';
    import { tupletScaleOf } from './js/domain/tuplets.js';
    import { keyToMidi } from './js/domain/pitch.js';
    import { drumType } from './js/domain/drums.js';
    import { sameKeys, nextRealNote, voiceListOf } from './js/domain/notes.js';

        const REST_KEY = { treble: 'b/4', bass: 'd/3', percussion: 'b/4' };
        let tapAttached = false;

        function clearCanvas() {
            const c = el('notation-container');
            const svg = c.querySelector('svg');
            if (svg) svg.remove();
            const err = el('engine-error');
            if (err) err.remove();
        }

        // --- Разбор ключа VexFlow на букву + акциденталь ("c#/4" -> '#') -----
        function accidentalOf(key) {
            const letterAndAcc = key.split('/')[0]; // "c#" / "cb" / "c"
            const acc = letterAndAcc.substring(1);  // "#", "b", "##", "bb" или ""
            return (acc === '#' || acc === 'b' || acc === '##' || acc === 'bb')
                ? acc : null;
        }

        // --- Построение тиклов одного голоса -------------------------------
        function buildVoice(VF, notes, clef, beats, beatValue, cursorIdx, measureIndex, voiceId) {
            const tickables = [];

            if (!notes || notes.length === 0) {
                // Пустой такт -> целая пауза, чтобы такт всегда рисовался.
                const placeholder = new VF.StaveNote({
                    keys: [REST_KEY[clef]], duration: 'wr', clef: clef,
                });
                placeholder.__hit = { m: measureIndex, v: voiceId, i: -1 };
                placeholder.__note = null;
                tickables.push(placeholder);
            } else {
                notes.forEach((n, i) => {
                    const isRest = !!n.rest;
                    const dots = n.dots || 0;
                    const dur = isRest ? n.duration + 'r' : n.duration;
                    const keys = isRest ? [REST_KEY[clef]] : n.keys;
                    const sn = new VF.StaveNote({
                        keys: keys, duration: dur, dots: dots,
                        clef: clef, auto_stem: true,
                    });
                    if (!isRest) {
                        keys.forEach((k, ki) => {
                            const acc = accidentalOf(k);
                            if (acc) sn.addModifier(new VF.Accidental(acc), ki);
                        });
                    }
                    // Глиф точки нужно навесить явно (по одному модификатору на
                    // точку); тиковую длительность задаёт опция dots выше.
                    for (let d = 0; d < dots; d++) {
                        VF.Dot.buildAndAttach([sn], { all: true });
                    }
                    if (i === cursorIdx) {
                        sn.setStyle({ fillStyle: '#2196F3', strokeStyle: '#2196F3' });
                    }
                    sn.__hit = { m: measureIndex, v: voiceId, i: i };
                    sn.__note = n; // доступ к флагам лиг (tieToNext/slurStart/slurStop)
                    tickables.push(sn);
                });
            }

            const voice = new VF.Voice({ num_beats: beats, beat_value: beatValue });
            voice.setMode(VF.Voice.Mode.SOFT); // терпим неполный такт при редактировании
            voice.addTickables(tickables);
            return voice;
        }

        // --- Главная функция отрисовки -------------------------------------
        // [forcedWidth] — фиксированная ширина полотна (для экспорта в PDF под
        // печатную ширину A4); иначе берётся ширина контейнера.
        function render(score, forcedWidth) {
            if (typeof Vex === 'undefined' || !Vex.Flow) {
                showError('Нотный движок не загрузился (assets/www/js/vexflow.js).');
                return;
            }
            const VF = Vex.Flow;
            // Позицию скролла фиксируем ДО пересборки SVG: удаление полотна
            // схлопывает документ и браузер сбрасывает scrollY в 0.
            const prevScrollY = window.scrollY || document.documentElement.scrollTop || 0;
            clearCanvas();
            state.noteHits = [];
            state.noteObjs = {};
            state.noteTransform = {};

            const container = el('notation-container');
            const width = forcedWidth || Math.max(320, container.clientWidth);
            const ts = (score.timeSignature || '4/4').split('/');
            const beats = parseInt(ts[0], 10) || 4;
            const beatValue = parseInt(ts[1], 10) || 4;
            const isDrums = score.instrument === 'drums';
            const measures = score.measures || [];
            const cursor = score.cursor || { measure: -1, voice: '', index: -1 };

            // --- раскладка: голова (ключ/размер) измеряется реально, а гибкая
            // нотная зона строки раздаётся ПРОПОРЦИОНАЛЬНО содержимому (cm).
            // Плотные такты получают заметно больше ширины (естественный вид),
            // разреженные — меньше. Сжатие нот (scaleX в formatAndDraw) остаётся
            // лишь как страховка для строки, чьё суммарное содержимое физически
            // не влезает; тогда оно равномерно по всем тактам строки.
            const margin = 8;
            const usableW = width - 2 * margin;
            const rowH = isDrums ? 130 : 200;
            const bassDY = 90;
            const INNER_PAD = 12; // правый запас (дыхание) в нотной зоне такта
            const voiceList = isDrums ? ['perc'] : ['treble', 'bass'];
            const clefList = isDrums ? ['percussion'] : ['treble', 'bass'];

            const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
            renderer.resize(width, Math.max(1, container.clientHeight || 200));
            const ctx = renderer.getContext();

            // Реальная ширина «головы» стана: левый отступ + ключ [+ тональность]
            // [+ размер], через getNoteStartX временного стана.
            function headStart(addClef, addTime) {
                const s = new VF.Stave(0, 0, 500);
                if (addClef) s.addClef(clefList[0]);
                if (addClef && !isDrums) s.addKeySignature(score.keySignature || 'C');
                if (addTime) s.addTimeSignature(score.timeSignature);
                s.setContext(ctx);
                s.format();
                return s.getNoteStartX();
            }
            const headFirst = headStart(true, true);   // такт 0: ключ+тональн.+размер
            const headRowStart = headStart(true, false); // начало строки: ключ+тональн.
            const headInner = headStart(false, false);   // середина строки: без ключа
            function headOf(rowStart, isFirst) {
                return isFirst ? headFirst : (rowStart ? headRowStart : headInner);
            }

            // проход 1: минимальная ширина содержимого каждого такта
            const cm = [];
            for (let i = 0; i < measures.length; i++) {
                const vs = voiceList.map(function (v, vi) {
                    return buildVoice(VF, measures[i][v] || [], clefList[vi],
                        beats, beatValue, -1, i, v);
                });
                cm.push(Math.max(40, measureMinWidth(VF, vs)));
            }

            // проход 2: упаковка в строки — добавляем такты, пока строка
            // помещается БЕЗ сжатия (Σголов + Σсодержимого ≤ usableW).
            const layoutRows = [];
            for (let i = 0; i < measures.length;) {
                const items = [];
                let sumHead = 0, sumE = 0;
                while (i < measures.length) {
                    const h = headOf(items.length === 0, i === 0);
                    const e = cm[i] + INNER_PAD;
                    if (items.length > 0 && sumHead + sumE + h + e > usableW) break;
                    items.push(i); sumHead += h; sumE += e; i++;
                }
                layoutRows.push(items);
            }
            const rows = layoutRows.length;
            const totalH = rows * rowH + 2 * margin;
            renderer.resize(width, totalH);

            // геометрия каждого такта {row, x, w} — для playhead/скролла
            const geom = new Array(measures.length);

            // проход 3: распределение ширины по содержимому + отрисовка
            for (let r = 0; r < rows; r++) {
                const items = layoutRows[r];
                const yTop = margin + r * rowH;
                let sumHead = 0, sumE = 0;
                const es = items.map(function (mi, col) {
                    const e = cm[mi] + INNER_PAD;
                    sumE += e;
                    sumHead += headOf(col === 0, mi === 0);
                    return e;
                });
                const flexible = Math.max(0, usableW - sumHead);
                // Σсодержимого больше гибкого места -> равномерно сжать (ratio<1);
                // меньше -> разлить остаток пропорц. содержимому (justify), но
                // последнюю (неполную) систему НЕ растягиваем — естественный вид.
                const ratio = sumE > flexible ? flexible / sumE : 1;
                const isLastRow = r === rows - 1;
                const extra = (!isLastRow && sumE < flexible) ? (flexible - sumE) : 0;
                let x = margin;

                for (let col = 0; col < items.length; col++) {
                    const i = items[col];
                    const m = measures[i];
                    const rowStart = col === 0;
                    const isFirst = i === 0;
                    const contentW = es[col] * ratio +
                        (sumE > 0 ? extra * (es[col] / sumE) : 0);
                    const w = headOf(rowStart, isFirst) + contentW;
                    geom[i] = { row: r, x: x, w: w };

                    try {
                        if (isDrums) {
                            const stave = new VF.Stave(x, yTop + 20, w);
                            if (rowStart) stave.addClef('percussion');
                            if (isFirst) stave.addTimeSignature(score.timeSignature);
                            stave.setContext(ctx).draw();

                            const cIdx = (cursor.measure === i && cursor.voice === 'perc')
                                ? cursor.index : -1;
                            const v = buildVoice(VF, m.perc, 'percussion', beats, beatValue, cIdx, i, 'perc');
                            formatAndDraw(VF, ctx, [v], [stave], w, rowStart, isFirst, beats, beatValue);
                        } else {
                            const treble = new VF.Stave(x, yTop, w);
                            const bass = new VF.Stave(x, yTop + bassDY, w);
                            if (rowStart) { treble.addClef('treble'); bass.addClef('bass'); }
                            if (isFirst) {
                                treble.addKeySignature(score.keySignature || 'C');
                                bass.addKeySignature(score.keySignature || 'C');
                                treble.addTimeSignature(score.timeSignature);
                                bass.addTimeSignature(score.timeSignature);
                            }
                            treble.setContext(ctx).draw();
                            bass.setContext(ctx).draw();

                            const tIdx = (cursor.measure === i && cursor.voice === 'treble')
                                ? cursor.index : -1;
                            const bIdx = (cursor.measure === i && cursor.voice === 'bass')
                                ? cursor.index : -1;
                            const tv = buildVoice(VF, m.treble, 'treble', beats, beatValue, tIdx, i, 'treble');
                            const bv = buildVoice(VF, m.bass, 'bass', beats, beatValue, bIdx, i, 'bass');
                            formatAndDraw(VF, ctx, [tv, bv], [treble, bass], w, rowStart, isFirst, beats, beatValue);

                            if (rowStart) {
                                new VF.StaveConnector(treble, bass)
                                    .setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
                                new VF.StaveConnector(treble, bass)
                                    .setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();
                            }
                        }
                    } catch (err) {
                        console.error('Render measure ' + i + ' failed:', err);
                    }
                    x += w;
                }
            }

            // Лиги Tie/Slur — отдельным проходом ПОСЛЕ нот (позиции готовы).
            try { drawTiesAndSlurs(VF, ctx, score, geom); }
            catch (err) { console.error('drawTiesAndSlurs failed:', err); }

            // индекс координат нот по noteId — для note-synced playhead/подсветки
            state.noteHitIndex = {};
            for (let h = 0; h < state.noteHits.length; h++) {
                state.noteHitIndex[state.noteHits[h].id] = state.noteHits[h];
            }

            // Подсветка выделения при наборе лиги фразировки (slur).
            drawSelectionHighlight(score.selection);

            // геометрия раскладки — нужна плееру и автоскроллу.
            // geom[i] = {row, x, w}: число тактов в строке переменное, поэтому
            // строку/координаты такта берём отсюда, а не из фиксированного perRow.
            state.lastLayout = { width: width, totalH: totalH, rowH: rowH, rows: rows,
                           geom: geom, margin: margin };

            // если идёт воспроизведение — пересобрать события под новую раскладку
            Playback.onRender();

            // Пересборка SVG сбрасывает прокрутку документа в начало. Чтобы при
            // вводе нот вид не «прыгал» наверх, удерживаем строку с курсором в
            // зоне видимости минимальным доводом скролла. Во время плеера этим
            // занимается Follow Playback — здесь не вмешиваемся.
            if (!Playback.isPlaying()) keepCursorInView(cursor, prevScrollY);

            attachTapListener();
        }

        // Восстанавливаем прежнюю прокрутку [prevY] после пересборки SVG. Если
        // строка курсора выходит за вьюпорт — минимально доводим её к краю;
        // иначе вид остаётся ровно там, где был (без «прыжка» наверх).
        function keepCursorInView(cursor, prevY) {
            if (!state.lastLayout) return;
            const vh = window.innerHeight || document.documentElement.clientHeight;
            const y = prevY || 0;
            let target = y;
            const mi = cursor ? cursor.measure : -1;
            const g = (mi != null && mi >= 0 && state.lastLayout.geom) ? state.lastLayout.geom[mi] : null;
            if (g) {
                const row = g.row;
                const rowTop = PAD + state.lastLayout.margin + row * state.lastLayout.rowH;
                const rowBottom = rowTop + state.lastLayout.rowH;
                if (rowTop < y) target = rowTop - 8;
                else if (rowBottom > y + vh) target = rowBottom - vh + 8;
            }
            const docH = Math.max(
                document.documentElement.scrollHeight, document.body.scrollHeight);
            target = Math.max(0, Math.min(target, Math.max(0, docH - vh)));
            // Всегда восстанавливаем скролл: после пересборки браузер уже мог
            // сбросить его в 0, поэтому даже target == prevY нужно применить.
            window.scrollTo(0, target);
        }

        // Группы для бимовки (как в профессиональных редакторах: по долям).
        //  - составные x/8 кратные 3 (6/8, 9/8, 12/8) -> по пунктирной четверти;
        //  - нерегулярные 5/8 -> 3+2, 7/8 -> 2+2+3 (распространённая запись);
        //  - остальное -> штатные группы VexFlow getDefaultBeamGroups (по долям),
        //    что чинит простые/сложные размеры разом.
        // Возвращает массив VF.Fraction.
        function beamGroups(VF, beats, beatValue) {
            if (beatValue === 8 && beats % 3 === 0) {
                return [new VF.Fraction(3, 8)];
            }
            if (beatValue === 8 && beats === 5) {
                return [new VF.Fraction(3, 8), new VF.Fraction(2, 8)];
            }
            if (beatValue === 8 && beats === 7) {
                return [new VF.Fraction(2, 8), new VF.Fraction(2, 8), new VF.Fraction(3, 8)];
            }
            try {
                const g = VF.Beam.getDefaultBeamGroups(beats + '/' + beatValue);
                if (g && g.length) return g;
            } catch (e) { /* fallback ниже */ }
            return [new VF.Fraction(1, beatValue)];
        }

        // Группирует подряд идущие ноты голоса в VF.Tuplet по их флагам
        // (__note.tuplet + tupletStart) — как tupletChunks в reflow.dart.
        // Конструктор Tuplet применяет множитель тиков, поэтому вызывать ДО
        // форматирования. Возвращает массив для отрисовки ПОСЛЕ нот/балок.
        function buildTuplets(VF, voice) {
            const tk = voice.getTickables();
            const out = [];
            let i = 0;
            while (i < tk.length) {
                const n = tk[i].__note;
                if (!n || !n.tuplet) { i++; continue; }
                const a = n.tuplet.actual, nm = n.tuplet.normal;
                const group = [tk[i]];
                let j = i + 1;
                while (j < tk.length) {
                    const m = tk[j].__note;
                    if (!m || !m.tuplet || m.tupletStart ||
                        m.tuplet.actual !== a || m.tuplet.normal !== nm) break;
                    group.push(tk[j]);
                    j++;
                }
                try {
                    out.push(new VF.Tuplet(group, {
                        num_notes: a, notes_occupied: nm, ratioed: false,
                    }));
                } catch (e) { console.error('tuplet build failed:', e); }
                i = j;
            }
            return out;
        }

        function formatAndDraw(VF, ctx, voices, staves, measureW, rowStart, isFirst, beats, beatValue) {
            const fmt = new VF.Formatter();
            voices.forEach((v) => fmt.joinVoices([v]));
            // Tuplets создаём ДО форматирования (применяют множитель тиков).
            const tuplets = [];
            voices.forEach((v) => buildTuplets(VF, v).forEach((t) => tuplets.push(t)));
            // Ширину нотной зоны берём из РЕАЛЬНОЙ геометрии стана (после ключа/
            // размера/тональности). Старт нот выравниваем по всем станам системы.
            let startX = 0;
            staves.forEach((s) => { startX = Math.max(startX, s.getNoteStartX()); });
            staves.forEach((s) => s.setNoteStartX(startX));
            const staveEnd = staves[0].getX() + staves[0].getWidth();
            const avail = Math.max(40, staveEnd - startX - 12); // 12 — запас справа

            // Минимально необходимая ширина содержимого. Если она больше доступной
            // (такт физически плотнее ширины экрана — много 16/32/64), форматируем
            // по натуральной ширине и СЖИМАЕМ ноты по горизонтали через <g scale>,
            // чтобы они уместились в барлайн. Линии стана при этом не трогаем.
            const minW = fmt.preCalculateMinTotalWidth(voices);
            const sx = minW > avail ? avail / minW : 1;
            fmt.format(voices, sx < 1 ? minW : avail);

            // Сжатие по X вокруг startX: x' = startX + sx*(x - startX).
            let grp = null;
            if (sx < 1 && ctx.openGroup) {
                ctx.openGroup('sq');
                grp = ctx.parent; // openGroup выставляет parent = новый <g>
            }

            const groups = beamGroups(VF, beats, beatValue);
            voices.forEach((v, idx) => {
                // Балки создаём ДО отрисовки нот: generateBeams помечает ноты
                // как забимованные, и тогда v.draw не рисует им одиночные флажки.
                const beams = VF.Beam.generateBeams(v.getTickables(), {
                    groups: groups,
                    beam_rests: false,
                    maintain_stem_directions: true,
                });
                v.draw(ctx, staves[idx]);
                beams.forEach((b) => b.setContext(ctx).draw());

                // координаты нот для тап-навигации (с учётом горизонтального сжатия)
                v.getTickables().forEach((t) => {
                    if (!t.__hit) return;
                    let bb;
                    try { bb = t.getBoundingBox(); } catch (e) { return; }
                    if (!bb) return;
                    const hx = startX + (bb.getX() - startX) * sx;
                    const id = t.__hit.m + ':' + t.__hit.v + ':' + t.__hit.i;
                    state.noteHits.push({
                        id: id,
                        m: t.__hit.m, v: t.__hit.v, i: t.__hit.i,
                        x: hx, y: bb.getY(), w: bb.getW() * sx, h: bb.getH(),
                    });
                    // Реестр объектов нот — нужен отрисовке лиг (Tie/Slur) после
                    // того, как все строки нарисованы и позиции финализированы.
                    // Вместе с трансформом сжатия такта (sx<1): ноты рисуются в
                    // <g scale>, и лигу нужно рисовать в ТОМ ЖЕ трансформе, иначе
                    // она уезжает по несжатым координатам (за край строки).
                    if (t.__hit.i >= 0) {
                        state.noteObjs[id] = t;
                        state.noteTransform[id] = sx < 1
                            ? { tx: startX * (1 - sx), sx: sx }
                            : { tx: 0, sx: 1 };
                    }
                });
            });

            // Числа/скобки tuplet — после нот и балок, в ТОМ ЖЕ контексте сжатия
            // (внутри grp при sx<1), чтобы совпадать со сжатыми нотами.
            tuplets.forEach((t) => {
                try { t.setContext(ctx).draw(); }
                catch (e) { console.error('tuplet draw failed:', e); }
            });

            if (grp) {
                ctx.closeGroup();
                grp.setAttribute('transform',
                    'translate(' + (startX * (1 - sx)) + ',0) scale(' + sx + ',1)');
            }
        }

        // =================================================================
        //  Отрисовка лиг: Tie (длительность) и Slur (фразировка)
        //  Два МУЗЫКАЛЬНО РАЗНЫХ объекта рисуются раздельно:
        //   - Tie  -> VF.StaveTie между нотой и следующей того же голоса/высоты;
        //   - Slur -> VF.Curve над диапазоном (маркеры slurStart/slurStop).
        //  Проход идёт ПОСЛЕ отрисовки всех нот (нужны финальные позиции).
        //  Известное ограничение: в тактах со сжатием (sx<1 в formatAndDraw,
        //  редкий overflow) дуга может слегка не совпасть — координаты нот
        //  доскейловые. Приемлемо для первого этапа.
        // =================================================================

        // Рисует [fn] внутри того же горизонтального трансформа сжатия [tr],
        // что и ноты такта (translate+scaleX). Иначе лига считалась бы по
        // несжатым координатам и уезжала за пределы такта/строки. tr.sx==1 —
        // трансформа нет (обычный такт), рисуем как есть.
        function withTransform(ctx, tr, fn) {
            if (tr && tr.sx < 1 && ctx.openGroup) {
                ctx.openGroup('liga');
                const g = ctx.parent; // openGroup выставляет parent = новый <g>
                fn();
                ctx.closeGroup();
                if (g && g.setAttribute) {
                    g.setAttribute('transform',
                        'translate(' + tr.tx + ',0) scale(' + tr.sx + ',1)');
                }
            } else {
                fn();
            }
        }

        function sameTr(a, b) {
            return a && b && a.sx === b.sx && a.tx === b.tx;
        }

        // Лига длительности. Внутри одного такта — целая (в его трансформе).
        // Соседние такты одной строки — целая (трансформ лишь если у обоих
        // одинаковый). Через перенос строки — две частичные, КАЖДАЯ в трансформе
        // своего такта (иначе хвост у сжатого такта уедет за край строки).
        function drawTie(VF, ctx, a, mA, rowA, trA, b, mB, rowB, trB, idx) {
            const full = function (tr) {
                withTransform(ctx, tr, function () {
                    new VF.StaveTie({ first_note: a, last_note: b,
                        first_indices: idx, last_indices: idx })
                        .setContext(ctx).draw();
                });
            };
            try {
                if (mA === mB) {
                    full(trA);
                } else if (rowA === rowB) {
                    full(sameTr(trA, trB) ? trA : null);
                } else {
                    withTransform(ctx, trA, function () {
                        new VF.StaveTie({ first_note: a, last_note: null,
                            first_indices: idx, last_indices: idx })
                            .setContext(ctx).draw();
                    });
                    withTransform(ctx, trB, function () {
                        new VF.StaveTie({ first_note: null, last_note: b,
                            first_indices: idx, last_indices: idx })
                            .setContext(ctx).draw();
                    });
                }
            } catch (e) { console.error('tie draw failed:', e); }
        }

        function drawSlur(VF, ctx, a, mA, rowA, trA, b, mB, rowB, trB) {
            try {
                if (rowA === rowB) {
                    const tr = (mA === mB) ? trA : (sameTr(trA, trB) ? trA : null);
                    withTransform(ctx, tr, function () {
                        new VF.Curve(a, b, {}).setContext(ctx).draw();
                    });
                } else {
                    // Через перенос строки — частичные дуги по сегментам
                    // (best-effort), каждая в трансформе своего такта.
                    try { withTransform(ctx, trA, function () {
                        new VF.Curve(a, null, {}).setContext(ctx).draw(); }); }
                    catch (e1) { /* нет правой границы — пропуск */ }
                    try { withTransform(ctx, trB, function () {
                        new VF.Curve(null, b, {}).setContext(ctx).draw(); }); }
                    catch (e2) { /* нет левой границы — пропуск */ }
                }
            } catch (e) { console.error('slur draw failed:', e); }
        }

        // [geom] -> строка такта (row); [state.noteObjs]/[state.noteTransform] -> объект и
        // трансформ сжатия ноты по noteId.
        function drawTiesAndSlurs(VF, ctx, score, geom) {
            const measures = score.measures || [];
            const voices = voiceListOf(score);
            const rowOf = function (mi) { return geom[mi] ? geom[mi].row : 0; };
            const idOf = function (mi, v, ni) { return mi + ':' + v + ':' + ni; };

            // --- Tie: попарная связь note -> следующая нота той же высоты ---
            for (let vi = 0; vi < voices.length; vi++) {
                const v = voices[vi];
                for (let mi = 0; mi < measures.length; mi++) {
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        if (!n || !n.tieToNext || n.rest) continue;
                        const p = nextRealNote(measures, v, mi, ni);
                        // Лига длительности валидна лишь между нотами одной высоты.
                        if (!p || p.note.rest || !sameKeys(n.keys, p.note.keys)) continue;
                        const idA = idOf(mi, v, ni), idB = idOf(p.mi, v, p.ni);
                        const a = state.noteObjs[idA], b = state.noteObjs[idB];
                        if (!a || !b) continue;
                        const idx = n.keys.map(function (_, k) { return k; });
                        drawTie(VF, ctx, a, mi, rowOf(mi), state.noteTransform[idA],
                            b, p.mi, rowOf(p.mi), state.noteTransform[idB], idx);
                    }
                }
            }

            // --- Slur: стек start/stop в пределах голоса по порядку ---
            for (let vi = 0; vi < voices.length; vi++) {
                const v = voices[vi];
                const stack = [];
                for (let mi = 0; mi < measures.length; mi++) {
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        if (!n) continue;
                        if (n.slurStart) stack.push({ mi: mi, ni: ni });
                        if (n.slurStop && stack.length > 0) {
                            const s = stack.pop();
                            const idA = idOf(s.mi, v, s.ni), idB = idOf(mi, v, ni);
                            const a = state.noteObjs[idA], b = state.noteObjs[idB];
                            if (a && b) drawSlur(VF, ctx, a, s.mi, rowOf(s.mi),
                                state.noteTransform[idA], b, mi, rowOf(mi), state.noteTransform[idB]);
                        }
                    }
                }
            }
        }

        // Подсветка выделенного диапазона нот при наборе лиги фразировки.
        // [sel] = { voice, m0, i0, m1, i1 } или отсутствует. Заливка иного цвета
        // (см. .note-sel) поверх SVG, поверх слоя нот, не перехватывает клики.
        function drawSelectionHighlight(sel) {
            const old = el('sel-highlights');
            if (old) old.remove();
            if (!sel) return;
            const layer = document.createElement('div');
            layer.id = 'sel-highlights';
            layer.style.position = 'absolute';
            layer.style.left = '0';
            layer.style.top = '0';
            layer.style.pointerEvents = 'none';
            const lo = sel.m0 * 100000 + sel.i0;
            const hi = sel.m1 * 100000 + sel.i1;
            for (let h = 0; h < state.noteHits.length; h++) {
                const hh = state.noteHits[h];
                if (hh.v !== sel.voice || hh.i < 0) continue;
                const rank = hh.m * 100000 + hh.i;
                if (rank < lo || rank > hi) continue;
                const d = document.createElement('div');
                d.className = 'note-sel';
                d.style.left = (PAD + hh.x - 3) + 'px';
                d.style.top = (PAD + hh.y - 3) + 'px';
                d.style.width = (hh.w + 6) + 'px';
                d.style.height = (hh.h + 6) + 'px';
                layer.appendChild(d);
            }
            el('notation-container').appendChild(layer);
        }

        // Тап по партитуре -> ближайшая нота -> курсор во Flutter.
        function attachTapListener() {
            if (tapAttached) return;
            tapAttached = true;
            const container = el('notation-container');
            container.addEventListener('click', function (e) {
                const svg = container.querySelector('svg');
                if (!svg || state.noteHits.length === 0) return;
                const rect = svg.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;

                let best = null, bestD = Infinity;
                for (const hh of state.noteHits) {
                    const cx = hh.x + hh.w / 2;
                    const cy = hh.y + hh.h / 2;
                    const d = (px - cx) * (px - cx) + (py - cy) * (py - cy);
                    if (d < bestD) { bestD = d; best = hh; }
                }
                // порог ~90px, чтобы случайные тапы по полю не дёргали курсор
                if (best && bestD <= 90 * 90 && window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onNoteTap', {
                        measure: best.m, voice: best.v, index: best.i,
                    });
                }
            });
        }

        // =================================================================
        //  Профессиональное оффлайн-воспроизведение
        //  - Playback Compiler: партитура -> события (noteId/startBeat/...)
        //  - AudioEngine: синтез голосов и ударных через Web Audio API
        //  - Scheduler: упреждающее планирование по AudioContext.currentTime
        //  - Note-synced playhead + подсветка нот + метроном
        //
        //  setInterval используется ТОЛЬКО как «насос» упреждения; тайминг
        //  звука и визуала привязан к AudioContext.currentTime (паттерн
        //  «двух часов»). setTimeout как механизм синхронизации не применяется.
        // =================================================================

        // Tie-merge для playback: внутри каждого голоса (события уже в порядке
        // времени) поглощаем цепочку лиг длительности в одно событие — один
        // attack, суммарная длительность. Поглощённые ноты переходят в
        // coveredNoteIds головного события (для подсветки всей цепочки).
        // Лига валидна лишь между нотами одной высоты, не паузами.
        function mergeTies(events) {
            const byVoice = {};
            for (let i = 0; i < events.length; i++) {
                const e = events[i];
                (byVoice[e.voiceId] || (byVoice[e.voiceId] = [])).push(e);
            }
            const out = [];
            for (const v in byVoice) {
                const list = byVoice[v];
                let k = 0;
                while (k < list.length) {
                    const head = list[k];
                    let j = k;
                    while (list[j].tieToNext && !list[j].rest && j + 1 < list.length) {
                        const nxt = list[j + 1];
                        if (nxt.rest || !sameKeys(head.keys, nxt.keys)) break;
                        head.durationBeats += nxt.durationBeats;
                        head.coveredNoteIds.push(nxt.noteId);
                        j++;
                    }
                    out.push(head);
                    k = j + 1;
                }
            }
            return out;
        }

        // --- Playback Compiler ---------------------------------------------
        // Событие: { noteId, startBeat, durationBeats, keys, voiceId, rest }.
        // Биты — в четвертях. Старт каждого такта привязан к его индексу
        // (base = mi * measureQ), поэтому неполные/перелитые такты не сбивают
        // временную сетку. Паузы и пустые такты дают «якоря» для playhead.
        function compilePlayback(payload) {
            const ts = (payload.timeSignature || '4/4').split('/');
            const beats = parseInt(ts[0], 10) || 4;
            const beatValue = parseInt(ts[1], 10) || 4;
            const isDrums = payload.instrument === 'drums';
            const voiceIds = isDrums ? ['perc'] : ['treble', 'bass'];
            const measures = payload.measures || [];
            const measureQ = beats * (4 / beatValue); // длина такта в четвертях
            let events = [];

            for (let mi = 0; mi < measures.length; mi++) {
                const base = mi * measureQ;
                for (let vi = 0; vi < voiceIds.length; vi++) {
                    const v = voiceIds[vi];
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    if (notes.length === 0) {
                        events.push({ noteId: mi + ':' + v + ':-1', startBeat: base,
                            durationBeats: measureQ, keys: [], voiceId: v, rest: true });
                        continue;
                    }
                    let acc = 0;
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        // Реальное время с учётом tuplet (нестандартная ритмика).
                        const q = durationBeats(n.duration, n.dots) * tupletScaleOf(n);
                        events.push({
                            noteId: mi + ':' + v + ':' + ni,
                            startBeat: base + acc,
                            durationBeats: q,
                            keys: n.keys || [],
                            voiceId: v,
                            rest: !!n.rest,
                            // Tie (лига длительности): объединяется в одно
                            // звучащее событие на merge-проходе ниже.
                            tieToNext: !!n.tieToNext,
                            coveredNoteIds: [], // ноты-продолжения цепочки лиг
                            // Громкость ноты (0..1). Сейчас по умолчанию mf;
                            // позже сюда проецируются динамические оттенки.
                            velocity: n.velocity != null ? n.velocity : 0.78,
                        });
                        acc += q;
                    }
                }
            }
            // Tie-merge: цепочка нот одной высоты -> одно событие (один attack,
            // суммарная длительность). Работает через границы тактов (события
            // уже на общей beat-сетке). Slur на playback НЕ влияет.
            events = mergeTies(events);
            events.sort(function (a, b) { return a.startBeat - b.startBeat; });
            return {
                events: events,
                totalBeats: measures.length * measureQ,
                beats: beats, beatValue: beatValue, measureQ: measureQ,
                isDrums: isDrums, primaryVoice: isDrums ? 'perc' : 'treble',
            };
        }

        function ensureHighlightLayer() {
            let layer = el('note-highlights');
            if (!layer) {
                layer = document.createElement('div');
                layer.id = 'note-highlights';
                el('notation-container').appendChild(layer);
            }
            return layer;
        }

        // --- Транспорт: scheduler + note-synced playhead + подсветка -------
        const Playback = {
            playing: false,
            comp: null,
            metronome: false,
            secPerQuarter: 0.5,
            startTime: 0,        // ctx.currentTime в момент beat 0
            lookahead: null,     // setInterval-«насос» упреждения
            raf: null,
            nextEvent: 0,        // указатель в comp.events
            nextClickBeat: 0,    // следующая доля метронома (в долях такта)
            xmap: [],            // beat->X по строкам (playhead по муз. времени)
            followPlayback: true,// Vertical Follow: скролл к новой системе
            _followRow: -1,      // строка, к которой последний раз скроллили
            _hl: {},             // активные элементы подсветки по noteId

            isPlaying: function () { return this.playing; },
            setMetronome: function (on) { this.metronome = !!on; },
            setFollowPlayback: function (on) { this.followPlayback = !!on; },

            currentBeat: function () {
                const ctx = AudioEngine.ctx;
                if (!ctx) return 0;
                return (ctx.currentTime - this.startTime) / this.secPerQuarter;
            },
            secForBeat: function (q) { return this.startTime + q * this.secPerQuarter; },

            // Карта «музыкальное время -> X» для КАЖДОЙ строки Grand Staff.
            // Якоря берём из onset'ов ОБОИХ голосов (и пауз — у них тоже есть
            // bbox), поэтому при длинной ноте в одной руке движение второй даёт
            // промежуточные точки и playhead не «застывает». Одновременные
            // onset'ы (аккорд / treble+bass на одной доле) усредняются в один X.
            // Замыкающий якорь ставим у правого барлайна строки.
            _buildXMap: function () {
                const lay = state.lastLayout;
                const rows = lay ? lay.rows : 1;
                const geom = (lay && lay.geom) || [];
                const measureQ = this.comp.measureQ || 4;

                const byRow = [];
                for (let r = 0; r < rows; r++) byRow.push({});

                const ev = this.comp.events;
                for (let i = 0; i < ev.length; i++) {
                    const e = ev[i];
                    const hb = state.noteHitIndex[e.noteId];
                    if (!hb) continue;
                    const mIdx = Math.floor(e.startBeat / measureQ + 1e-6);
                    const g = geom[mIdx];
                    if (!g) continue;
                    const slot = byRow[g.row];
                    const key = e.startBeat.toFixed(4);
                    if (!slot[key]) slot[key] = { beat: e.startBeat, sum: 0, n: 0 };
                    slot[key].sum += hb.x + hb.w / 2;
                    slot[key].n++;
                }

                // правый край и последний такт каждой строки (для замыкающего
                // якоря — куда доезжает линия на долгих нотах в конце системы)
                const rowRight = [], rowLastBeat = [];
                for (let r = 0; r < rows; r++) { rowRight.push(0); rowLastBeat.push(0); }
                for (let mi = 0; mi < geom.length; mi++) {
                    const g = geom[mi];
                    if (!g) continue;
                    const right = g.x + g.w;
                    if (right > rowRight[g.row]) rowRight[g.row] = right;
                    const endBeat = (mi + 1) * measureQ;
                    if (endBeat > rowLastBeat[g.row]) rowLastBeat[g.row] = endBeat;
                }

                const xmap = [];
                for (let r = 0; r < rows; r++) {
                    const arr = [];
                    const slot = byRow[r];
                    for (const key in slot)
                        arr.push({ beat: slot[key].beat, x: slot[key].sum / slot[key].n });
                    arr.sort(function (a, b) { return a.beat - b.beat; });
                    if (rowLastBeat[r] > 0 &&
                        (arr.length === 0 || arr[arr.length - 1].beat < rowLastBeat[r] - 1e-6))
                        arr.push({ beat: rowLastBeat[r], x: rowRight[r] - 6 });
                    xmap.push(arr);
                }
                this.xmap = xmap;
            },

            // вызывается из render(): пересобрать события под правки в редакторе
            onRender: function () {
                if (!this.playing || !state.lastPayload) return;
                const curBeat = this.currentBeat();
                this.comp = compilePlayback(state.lastPayload);
                this._buildXMap();
                this.nextEvent = 0;
                while (this.nextEvent < this.comp.events.length &&
                       this.comp.events[this.nextEvent].startBeat < curBeat) this.nextEvent++;
            },

            start: function (payload, tempo) {
                if (!payload) return;
                const ctx = AudioEngine.ensure();
                if (!ctx) { showError('Web Audio недоступен в этом WebView.'); return; }
                AudioEngine.resume();
                this.stop(true); // сброс прежней сессии без снятия активности UI
                this.secPerQuarter = 60 / (Number(tempo) || 120);
                this.comp = compilePlayback(payload);
                this._buildXMap();
                if (this.comp.events.length === 0) return;
                this.playing = true;
                this.nextEvent = 0;
                this.nextClickBeat = 0;
                this._followRow = -1; // первая смена системы вызовет скролл
                this.startTime = ctx.currentTime + 0.08; // запас на планирование
                el('playhead').classList.add('active');
                const self = this;
                this.lookahead = setInterval(function () { self._schedule(); }, 25);
                this._schedule();
                this.raf = requestAnimationFrame(function () { self._frame(); });
            },

            _schedule: function () {
                const ctx = AudioEngine.ctx; if (!ctx || !this.playing) return;
                const horizon = ctx.currentTime + 0.12;
                const ev = this.comp.events;

                while (this.nextEvent < ev.length &&
                       this.secForBeat(ev[this.nextEvent].startBeat) < horizon) {
                    const e = ev[this.nextEvent];
                    const when = Math.max(ctx.currentTime, this.secForBeat(e.startBeat));
                    if (!e.rest && e.keys.length) {
                        if (this.comp.isDrums) {
                            for (let k = 0; k < e.keys.length; k++)
                                AudioEngine.playDrum(drumType(e.keys[k]), when, e.velocity);
                        } else {
                            const durS = e.durationBeats * this.secPerQuarter;
                            for (let k = 0; k < e.keys.length; k++)
                                AudioEngine.playPiano(keyToMidi(e.keys[k]), when, durS, e.velocity);
                        }
                    }
                    this.nextEvent++;
                }

                // метроном: доля = 4/beatValue четвертей, акцент на доле 0 такта.
                // Счётчик двигаем всегда — звучит только при включённом метрономе.
                const beatQ = 4 / this.comp.beatValue;
                while (this.nextClickBeat * beatQ <= this.comp.totalBeats &&
                       this.secForBeat(this.nextClickBeat * beatQ) < horizon) {
                    if (this.metronome) {
                        const when = this.secForBeat(this.nextClickBeat * beatQ);
                        if (when >= ctx.currentTime) {
                            const accent = (this.nextClickBeat % this.comp.beats) === 0;
                            AudioEngine.click(when, accent);
                        }
                    }
                    this.nextClickBeat++;
                }

                if (this.nextEvent >= ev.length &&
                    ctx.currentTime > this.secForBeat(this.comp.totalBeats) + 0.05) {
                    this.stop();
                    if (window.flutter_inappwebview)
                        window.flutter_inappwebview.callHandler('onPlaybackEnded');
                }
            },

            _frame: function () {
                if (!this.playing) return;
                const curBeat = this.currentBeat();
                this._positionPlayhead(curBeat);
                this._highlight(curBeat);
                this._followScroll(this._rowForBeat(curBeat));
                const self = this;
                this.raf = requestAnimationFrame(function () { self._frame(); });
            },

            // Строка (система) для текущей доли — из такта, а не из id ноты.
            _rowForBeat: function (curBeat) {
                const measureQ = this.comp.measureQ || 4;
                const total = this.comp.totalBeats;
                const geom = (state.lastLayout && state.lastLayout.geom) || [];
                const totalMeasures = Math.max(1, Math.round(total / measureQ));
                let mIdx = Math.floor(Math.max(0, Math.min(curBeat, total)) / measureQ + 1e-6);
                if (mIdx >= totalMeasures) mIdx = totalMeasures - 1;
                if (mIdx < 0) mIdx = 0;
                return geom[mIdx] ? geom[mIdx].row : 0;
            },

            // Vertical Follow Playback: пока playhead внутри текущей системы —
            // ничего не делаем; при переходе на новую систему — ОДИН плавный
            // вертикальный скролл, ставящий систему примерно по центру экрана.
            // Скроллим собственный документ WebView (контейнер прокрутки).
            _followScroll: function (row) {
                if (!this.followPlayback) return;
                if (row === this._followRow) return;
                this._followRow = row;
                const lay = state.lastLayout;
                if (!lay) return;
                const vh = window.innerHeight || document.documentElement.clientHeight;
                const rowTop = PAD + lay.margin + row * lay.rowH;
                const target = rowTop - (vh - lay.rowH) / 2; // система по центру
                const docH = Math.max(
                    document.documentElement.scrollHeight, document.body.scrollHeight);
                const maxY = Math.max(0, docH - vh);
                const y = Math.max(0, Math.min(target, maxY));
                try {
                    window.scrollTo({ top: y, behavior: 'smooth' });
                } catch (e) {
                    window.scrollTo(0, y); // старые WebView без smooth-опции
                }
            },

            // Позиция playhead = музыкальное время (curBeat), а НЕ последняя
            // сыгранная нота. Строку определяем по такту текущей доли, X —
            // интерполяцией между beat-якорями строки (онсеты обоих голосов).
            _positionPlayhead: function (curBeat) {
                const ph = el('playhead');
                if (!this.xmap || !this.xmap.length) return;
                const total = this.comp.totalBeats;
                const b = Math.max(0, Math.min(curBeat, total));
                const row = this._rowForBeat(curBeat);
                const anchors = this.xmap[row];
                if (!anchors || anchors.length === 0) return;

                let x;
                if (b <= anchors[0].beat) {
                    x = anchors[0].x;
                } else if (b >= anchors[anchors.length - 1].beat) {
                    x = anchors[anchors.length - 1].x;
                } else {
                    let k = 0;
                    while (k + 1 < anchors.length && anchors[k + 1].beat <= b) k++;
                    const a = anchors[k], c = anchors[k + 1];
                    const span = c.beat - a.beat;
                    const frac = span > 0 ? (b - a.beat) / span : 0;
                    x = a.x + frac * (c.x - a.x);
                }

                const rowH = state.lastLayout ? state.lastLayout.rowH : 200;
                const margin = state.lastLayout ? state.lastLayout.margin : 8;
                ph.style.left = (PAD + x) + 'px';
                ph.style.top = (PAD + margin + row * rowH) + 'px';
                ph.style.height = (rowH - 8) + 'px';
            },

            _highlight: function (curBeat) {
                const layer = ensureHighlightLayer();
                const active = {};
                const ev = this.comp.events;
                for (let i = 0; i < ev.length; i++) {
                    const e = ev[i];
                    if (e.startBeat > curBeat) break; // отсортировано по началу
                    if (e.rest || !e.keys.length) continue;
                    if (curBeat < e.startBeat + e.durationBeats) {
                        active[e.noteId] = true;
                        // Tie: подсвечиваем все ноты цепочки, пока звучит событие.
                        if (e.coveredNoteIds) {
                            for (let c = 0; c < e.coveredNoteIds.length; c++)
                                active[e.coveredNoteIds[c]] = true;
                        }
                    }
                }
                for (const id in this._hl) {
                    if (!active[id]) {
                        if (this._hl[id].parentNode) layer.removeChild(this._hl[id]);
                        delete this._hl[id];
                    }
                }
                for (const id in active) {
                    if (this._hl[id]) continue;
                    const hb = state.noteHitIndex[id];
                    if (!hb) continue;
                    const d = document.createElement('div');
                    d.className = 'note-hl';
                    d.style.left = (PAD + hb.x - 3) + 'px';
                    d.style.top = (PAD + hb.y - 3) + 'px';
                    d.style.width = (hb.w + 6) + 'px';
                    d.style.height = (hb.h + 6) + 'px';
                    layer.appendChild(d);
                    this._hl[id] = d;
                }
            },

            stop: function (keepActive) {
                if (this.lookahead) { clearInterval(this.lookahead); this.lookahead = null; }
                if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }
                if (!keepActive) {
                    this.playing = false;
                    el('playhead').classList.remove('active');
                    const layer = el('note-highlights');
                    if (layer) layer.innerHTML = '';
                    this._hl = {};
                    try { SampledPiano.stopAll(); } catch (e) { /* no-op */ }
                    try { SampledDrums.stopAll(); } catch (e) { /* no-op */ }
                }
            },
        };

        // =================================================================
        //  Промышленная постраничная вёрстка A4 (Justification)
        //  Слой поверх спейсинга VexFlow: минимальные ширины тактов берём из
        //  Formatter.preCalculateMinTotalWidth (нелинейный спейсинг по
        //  длительностям заложен в движке), а системную/страничную пагинацию
        //  и выравнивание по обоим краям считаем сами — этого слоя в VexFlow
        //  нет (как layout-слой над спейсингом в MuseScore).
        // =================================================================
        const PAGE = { W: 794, H: 1123, mx: 56, mtop: 72, mbot: 56 }; // A4 @96dpi
        const MEASURE_PAD = 16;    // правый запас в такте (дыхание/барлайн)
        const SYS_GAP_MIN = 12;    // мин. интервал между системами
        const SYS_GAP_MAX = 40;    // потолок интервала (плотная вёрстка)
        const NOTE_RIGHT_PAD = 10; // запас справа от последней ноты

        function printW() { return PAGE.W - 2 * PAGE.mx; }
        function printH() { return PAGE.H - PAGE.mtop - PAGE.mbot; }

        // Конфигурация станов под инструмент.
        function layoutConfig(instrument) {
            if (instrument === 'drums') {
                return {
                    grand: false,
                    staves: [{ voice: 'perc', clef: 'percussion', dy: 0 }],
                    keySig: false,
                    systemHeight: 96,
                };
            }
            return {
                grand: true,
                staves: [
                    { voice: 'treble', clef: 'treble', dy: 0 },
                    { voice: 'bass', clef: 'bass', dy: 82 },
                ],
                keySig: true,
                systemHeight: 172,
            };
        }

        function newPage(root) {
            const div = document.createElement('div');
            div.className = 'pf-page';
            root.appendChild(div);
            const r = new Vex.Flow.Renderer(div, Vex.Flow.Renderer.Backends.SVG);
            r.resize(PAGE.W, PAGE.H);
            return r.getContext();
        }

        // Минимальная структурная ширина содержимого такта (без модификаторов).
        function measureMinWidth(VF, voices) {
            const f = new VF.Formatter();
            voices.forEach(function (v) { f.joinVoices([v]); });
            return f.preCalculateMinTotalWidth(voices);
        }

        // Ширина «головы» стана: ключ + ключевые знаки [+ размер].
        function headWidth(VF, ctx, cfg, keySig, timeSig, withTime) {
            const s = new VF.Stave(0, 0, 400);
            s.addClef(cfg.staves[0].clef);
            if (cfg.keySig && keySig) s.addKeySignature(keySig);
            if (withTime && timeSig) s.addTimeSignature(timeSig);
            s.setContext(ctx);
            s.format();
            return s.getNoteStartX() - s.getX();
        }

        function textWidth(ctx, str, approxCharW) {
            try {
                const w = ctx.measureText(str).width;
                if (w && w > 0) return w;
            } catch (e) { /* fallthrough */ }
            return str.length * (approxCharW || 8);
        }

        function drawTitle(ctx, title, composer) {
            ctx.save();
            ctx.setFont('serif', 22, 'bold');
            ctx.fillText(title, (PAGE.W - textWidth(ctx, title, 12)) / 2, PAGE.mtop - 34);
            if (composer) {
                ctx.setFont('serif', 13, '');
                ctx.fillText(composer,
                    PAGE.W - PAGE.mx - textWidth(ctx, composer, 7), PAGE.mtop - 14);
            }
            ctx.restore();
        }

        // Отрисовка одной системы (строки) на странице. [sysIndex] — сквозной
        // номер системы, [registry] — реестр noteId -> {sn, ctx, sys} для
        // последующего прохода лиг (Tie/Slur), общий на всю печать.
        function drawSystem(VF, ctx, sys, measures, cfg, yTop, beats, beatValue,
                            keySig, timeSig, sysIndex, registry) {
            let x = PAGE.mx;
            sys.items.forEach(function (idx, pos) {
                const isFirst = (pos === 0);
                const withTime = isFirst && sys.firstMeasure === 0;
                const content = sys.widths[idx];
                const staveW = (isFirst ? sys.L : 0) + content;

                // Свежие голоса под отрисовку (ноты нельзя переиспользовать).
                // measureIndex = idx — нужен реестру лиг (noteId "m:v:i").
                const voices = cfg.staves.map(function (st) {
                    return buildVoice(VF, measures[idx][st.voice] || [], st.clef,
                        beats, beatValue, -1, idx, st.voice);
                });

                // Станы такта.
                const staves = cfg.staves.map(function (st) {
                    const stave = new VF.Stave(x, yTop + st.dy, staveW);
                    if (isFirst) {
                        stave.addClef(st.clef);
                        if (cfg.keySig && keySig) stave.addKeySignature(keySig);
                        if (withTime && timeSig) stave.addTimeSignature(timeSig);
                    }
                    stave.setContext(ctx);
                    stave.format();
                    return stave;
                });

                // Единый старт нот по всем станам системы (вертикальное выравнивание).
                let startX = x;
                staves.forEach(function (s) { startX = Math.max(startX, s.getNoteStartX()); });
                staves.forEach(function (s) { s.setNoteStartX(startX); });
                const contentW = Math.max(40, (x + staveW) - startX - NOTE_RIGHT_PAD);

                // Один форматтер на такт — ноты разных станов выравниваются по тактам.
                const f = new VF.Formatter();
                voices.forEach(function (v) { f.joinVoices([v]); });
                // Tuplets — ДО форматирования (применяют множитель тиков).
                const tuplets = [];
                voices.forEach(function (v) {
                    buildTuplets(VF, v).forEach(function (t) { tuplets.push(t); });
                });
                f.format(voices, contentW);

                staves.forEach(function (s) { s.draw(); });
                voices.forEach(function (v, si) {
                    // Балки создаём ДО отрисовки нот: тогда у забимованных нот
                    // не рисуются одиночные флажки (хвосты).
                    const beams = VF.Beam.generateBeams(v.getTickables(), {
                        groups: beamGroups(VF, beats, beatValue),
                        beam_rests: false,
                        maintain_stem_directions: true,
                    });
                    v.draw(ctx, staves[si]);
                    beams.forEach(function (b) { b.setContext(ctx).draw(); });

                    // Регистрируем ноты для прохода лиг (после draw — позиции готовы).
                    if (registry) {
                        v.getTickables().forEach(function (t) {
                            if (!t.__hit || t.__hit.i < 0) return;
                            registry[t.__hit.m + ':' + t.__hit.v + ':' + t.__hit.i] =
                                { sn: t, ctx: ctx, sys: sysIndex };
                        });
                    }
                });
                // Числа/скобки tuplet — после нот и балок.
                tuplets.forEach(function (t) {
                    try { t.setContext(ctx).draw(); }
                    catch (e) { console.error('tuplet draw failed:', e); }
                });

                // Системная скобка + левая линия (клавишные).
                if (isFirst && cfg.grand) {
                    new VF.StaveConnector(staves[0], staves[1])
                        .setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
                    new VF.StaveConnector(staves[0], staves[1])
                        .setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();
                }

                // Номер первого такта системы — вплотную НАД верхней линией
                // верхнего стана. Первый такт пьесы не нумеруем.
                if (isFirst && sys.firstMeasure > 0) {
                    const topStave = staves[0];
                    ctx.save();
                    ctx.setFont('sans-serif', 11, '');
                    ctx.fillText(String(sys.firstMeasure + 1),
                        x + 1, topStave.getYForLine(0) - 4);
                    ctx.restore();
                }

                x += staveW;
            });
        }

        // Главный вход постраничной вёрстки: строит страницы A4 в #print-root,
        // возвращает их количество.
        function renderPrintPages(score) {
            const VF = Vex.Flow;
            const root = el('print-root');
            root.innerHTML = '';

            const tsParts = (score.timeSignature || '4/4').split('/');
            const beats = parseInt(tsParts[0], 10) || 4;
            const beatValue = parseInt(tsParts[1], 10) || 4;
            const instrument = score.instrument === 'drums' ? 'drums' : 'piano';
            const cfg = layoutConfig(instrument);
            const measures = score.measures || [];
            const keySig = cfg.keySig ? (score.keySignature || 'C') : null;
            const timeSig = score.timeSignature || (beats + '/' + beatValue);
            if (measures.length === 0) return 0;

            // --- проход 1: минимальные ширины тактов ---
            const cm = [];
            for (let i = 0; i < measures.length; i++) {
                const vs = cfg.staves.map(function (st) {
                    return buildVoice(VF, measures[i][st.voice] || [], st.clef,
                        beats, beatValue, -1, -1, st.voice);
                });
                cm.push(Math.max(48, measureMinWidth(VF, vs)));
            }

            // первая страница + замер ширин «головы» стана
            const ctx0 = newPage(root);
            const clefKeyW = headWidth(VF, ctx0, cfg, keySig, timeSig, false);
            const timeExtra = headWidth(VF, ctx0, cfg, keySig, timeSig, true) - clefKeyW;

            // --- проход 2: разбиение на системы ---
            const W = printW();
            const systems = [];
            let i = 0;
            while (i < measures.length) {
                const sys = { items: [], firstMeasure: i, L: clefKeyW + (i === 0 ? timeExtra : 0) };
                let used = sys.L;
                while (i < measures.length) {
                    const add = cm[i] + MEASURE_PAD;
                    if (sys.items.length > 0 && used + add > W) break;
                    sys.items.push(i);
                    used += add;
                    i++;
                }
                systems.push(sys);
            }

            // --- проход 3: горизонтальный justify ---
            systems.forEach(function (sys, si) {
                const budget = W - sys.L;
                const sumCm = sys.items.reduce(function (a, k) { return a + cm[k]; }, 0);
                const natural = sumCm + sys.items.length * MEASURE_PAD;
                const isLast = si === systems.length - 1;
                let delta = budget - natural;
                if (delta < 0) delta = 0;
                const justify = !(isLast && natural / budget < 0.5);
                sys.widths = {};
                sys.items.forEach(function (k) {
                    let cw = cm[k] + MEASURE_PAD;
                    if (justify && sumCm > 0) cw += delta * (cm[k] / sumCm);
                    sys.widths[k] = cw;
                });
            });

            // --- проход 4: страничная раскладка (вертикальный justify) ---
            const Hh = printH();
            const sysH = cfg.systemHeight;
            const perPage = Math.max(1,
                Math.floor((Hh + SYS_GAP_MIN) / (sysH + SYS_GAP_MIN)));
            const pages = [];
            for (let s = 0; s < systems.length; s += perPage) {
                pages.push(systems.slice(s, s + perPage));
            }

            // Реестр нот для прохода лиг: noteId -> {sn, ctx, sys}. Сквозной
            // номер системы (sysGi) различает системы на одной странице (общий
            // ctx) — лига внутри системы рисуется целиком, между системами —
            // частичными дугами на соответствующих ctx.
            const printObjs = {};
            let sysGi = 0;

            for (let p = 0; p < pages.length; p++) {
                const pageSystems = pages[p];
                const ctx = (p === 0) ? ctx0 : newPage(root);
                const n = pageSystems.length;
                const isLastPage = p === pages.length - 1;

                let headOffset = 0;
                if (p === 0 && score.title) {
                    drawTitle(ctx, score.title, score.composer);
                    headOffset = score.composer ? 16 : 4;
                }
                const budgetH = Hh - headOffset;

                let gap;
                if (n > 1 && !isLastPage) {
                    gap = (budgetH - n * sysH) / (n - 1);
                    gap = Math.max(SYS_GAP_MIN, Math.min(SYS_GAP_MAX, gap));
                } else {
                    gap = SYS_GAP_MIN;
                }

                let y = PAGE.mtop + headOffset;
                for (let k = 0; k < n; k++) {
                    drawSystem(VF, ctx, pageSystems[k], measures, cfg, y,
                        beats, beatValue, keySig, timeSig, sysGi, printObjs);
                    sysGi++;
                    y += sysH + gap;
                }
            }

            // Лиги Tie/Slur — отдельным проходом после отрисовки всех страниц.
            try { drawPrintTiesAndSlurs(VF, score, printObjs); }
            catch (err) { console.error('drawPrintTiesAndSlurs failed:', err); }

            return pages.length;
        }

        // Проход лиг для печати: как drawTiesAndSlurs, но ctx у каждой ноты свой
        // (страницы — разные SVG). Внутри одной системы — целая дуга; между
        // системами — частичные дуги на ctx каждого конца.
        function drawPrintTiesAndSlurs(VF, score, registry) {
            const measures = score.measures || [];
            const voices = voiceListOf(score);
            const objOf = function (mi, v, ni) { return registry[mi + ':' + v + ':' + ni]; };

            function tie(a, b, idx) {
                try {
                    if (a.sys === b.sys) {
                        new VF.StaveTie({ first_note: a.sn, last_note: b.sn,
                            first_indices: idx, last_indices: idx })
                            .setContext(a.ctx).draw();
                    } else {
                        new VF.StaveTie({ first_note: a.sn, last_note: null,
                            first_indices: idx, last_indices: idx })
                            .setContext(a.ctx).draw();
                        new VF.StaveTie({ first_note: null, last_note: b.sn,
                            first_indices: idx, last_indices: idx })
                            .setContext(b.ctx).draw();
                    }
                } catch (e) { console.error('print tie failed:', e); }
            }
            function slur(a, b) {
                try {
                    if (a.sys === b.sys) {
                        new VF.Curve(a.sn, b.sn, {}).setContext(a.ctx).draw();
                    } else {
                        try { new VF.Curve(a.sn, null, {}).setContext(a.ctx).draw(); }
                        catch (e1) { /* пропуск */ }
                        try { new VF.Curve(null, b.sn, {}).setContext(b.ctx).draw(); }
                        catch (e2) { /* пропуск */ }
                    }
                } catch (e) { console.error('print slur failed:', e); }
            }

            for (let vi = 0; vi < voices.length; vi++) {
                const v = voices[vi];
                for (let mi = 0; mi < measures.length; mi++) {
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        if (!n || !n.tieToNext || n.rest) continue;
                        const p = nextRealNote(measures, v, mi, ni);
                        if (!p || p.note.rest || !sameKeys(n.keys, p.note.keys)) continue;
                        const a = objOf(mi, v, ni), b = objOf(p.mi, v, p.ni);
                        if (a && b) tie(a, b, n.keys.map(function (_, k) { return k; }));
                    }
                }
            }
            for (let vi = 0; vi < voices.length; vi++) {
                const v = voices[vi];
                const stack = [];
                for (let mi = 0; mi < measures.length; mi++) {
                    const notes = (measures[mi] && measures[mi][v]) || [];
                    for (let ni = 0; ni < notes.length; ni++) {
                        const n = notes[ni];
                        if (!n) continue;
                        if (n.slurStart) stack.push({ mi: mi, ni: ni });
                        if (n.slurStop && stack.length > 0) {
                            const s = stack.pop();
                            const a = objOf(s.mi, v, s.ni), b = objOf(mi, v, ni);
                            if (a && b) slur(a, b);
                        }
                    }
                }
            }
        }

        // =================================================================
        //  Публичный мост (вызывается из Flutter)
        // =================================================================

        // Принимает base64(UTF-8 JSON) — безопасно для evaluateJavascript.
        window.ScoreFlow = {
            renderB64: function (b64) {
                try {
                    const json = decodeURIComponent(escape(window.atob(b64)));
                    state.lastPayload = JSON.parse(json);
                    render(state.lastPayload);
                } catch (e) {
                    showError('Ошибка разбора партитуры: ' + e.message);
                }
            },

            // Верстает партитуру по страницам A4 в #print-root (вектор) и
            // возвращает их число. Печать инициирует Flutter через
            // printCurrentPage() — @media print покажет именно эти страницы.
            renderPrintB64: function (b64) {
                try {
                    const json = decodeURIComponent(escape(window.atob(b64)));
                    const score = JSON.parse(json);
                    return renderPrintPages(score);
                } catch (e) {
                    showError('Ошибка вёрстки печати: ' + e.message);
                    return 0;
                }
            },

            // Метроном: вкл/выкл. Состояние сохраняется между запусками плеера.
            setMetronome: function (on) {
                try { Playback.setMetronome(on); } catch (e) { /* no-op */ }
            },

            // Vertical Follow Playback: вкл/выкл автоскролл к текущей системе.
            // По умолчанию включён. Состояние сохраняется между запусками.
            setFollowPlayback: function (on) {
                try { Playback.setFollowPlayback(on); } catch (e) { /* no-op */ }
            },

            // Предзагрузка сэмплов концертного рояля (локальный сервер, оффлайн).
            // Идемпотентно: повторные вызовы безопасны. Без сэмплов плеер
            // продолжит работать на синтез-fallback.
            loadPiano: function () {
                const ctx = AudioEngine.ensure();
                if (ctx) SampledPiano.load(ctx, AudioEngine.master);
            },

            // Демпфер-педаль (sustain): держит звучащие ноты до отпускания.
            setSustain: function (on) {
                try { SampledPiano.setSustain(on); } catch (e) { /* no-op */ }
            },

            // Предзагрузка сэмплов ударной установки (локальный сервер, оффлайн).
            // Идемпотентно. Без сэмплов плеер играет синтез-fallback.
            loadDrums: function () {
                const ctx = AudioEngine.ensure();
                if (ctx) SampledDrums.load(ctx, AudioEngine.master);
            },

            // Диагностика layout: для такта 4/4, забитого N равными нотами,
            // выводит minWidth (VexFlow) и assignedWidth (наш layout-движок).
            // Возвращает массив и пишет таблицу в консоль WebView.
            debugMeasureWidths: function () {
                const VF = Vex.Flow;
                const cont = el('notation-container');
                const usableW = Math.max(320, cont.clientWidth) - 16; // 2*margin
                const cases = [['16-е', '16', 16], ['32-е', '32', 32], ['64-е', '64', 64]];
                const head = 24 + 36 + 46; // ключ + размер + тональность (первый такт)
                const avail = Math.max(40, usableW - head); // доступная зона нот
                const rows = cases.map(function (c) {
                    const notes = [];
                    for (let i = 0; i < c[2]; i++)
                        notes.push({ keys: ['c/5'], duration: c[1], dots: 0 });
                    const v = buildVoice(VF, notes, 'treble', 4, 4, -1, 0, 'treble');
                    const minW = measureMinWidth(VF, [v]);
                    const sx = minW > avail ? avail / minW : 1; // как в formatAndDraw
                    return {
                        case: c[0], count: c[2],
                        minWidth: Math.round(minW),
                        availWidth: Math.round(avail),
                        scaleX: Math.round(sx * 100) / 100,
                        // ноты всегда умещаются: при minW>avail сжимаются по X
                        fits: true,
                    };
                });
                console.table(rows);
                rows.forEach(function (r) {
                    console.log('[layout] ' + r.case + ' (' + r.count + '): minWidth=' +
                        r.minWidth + 'px availWidth=' + r.availWidth +
                        'px scaleX=' + r.scaleX + ' fits=' + r.fits);
                });
                return rows;
            },
        };

        // Контракт плеера сохранён: 'PLAY' (с tempo) запускает воспроизведение
        // текущей партитуры с начала, 'PAUSE' останавливает.
        window.handlePlaybackCommand = function (action, value) {
            if (action === 'PLAY') {
                Playback.start(state.lastPayload, value);
            } else if (action === 'PAUSE') {
                Playback.stop();
            }
        };

        // Мост Flutter готов.
        window.addEventListener('flutterInAppWebViewPlatformReady', function () {
            console.log('Flutter WebView Bridge Connected.');
        });

        // Перерисовка под новую ширину (поворот экрана / смена вида).
        let resizeTimer = null;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                if (state.lastPayload) render(state.lastPayload);
            }, 180);
        });
    </script>
</body>
</html>
